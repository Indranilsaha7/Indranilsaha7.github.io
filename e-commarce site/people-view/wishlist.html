<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="logo/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist | Baroda Shop1</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Link to Component Styles -->
    <link rel="stylesheet" href="style/topbar/topbar.css">
    <link rel="stylesheet" href="style/footer/footer.css">
    <link rel="stylesheet" href="style/sidebar-dash/sidebar-das.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex-grow: 1;
            padding: 6rem 2rem 2rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dashboard-wrapper {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            .dashboard-wrapper {
                grid-template-columns: 1fr;
            }
        }
        .dashboard-content {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            min-height: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .section-header {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Local CSS specifically isolated for the Wishlist Grid */
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }
        .wishlist-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .wishlist-card:hover {
            transform: translateY(-5px);
            border-color: #818cf8;
        }
        .wishlist-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }
        .wishlist-info {
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .wishlist-title {
            font-size: 1.1rem;
            margin: 0 0 0.5rem 0;
            color: #f8fafc;
        }
        .wishlist-price {
            color: #c084fc;
            font-weight: 600;
            margin: 0 0 1rem 0;
        }
        .wishlist-actions {
            display: flex;
            justify-content: space-between;
            margin-top: auto;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px -5px #4f46e5;
        }
        .btn-icon {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: none;
            padding: 0.6rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-icon:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div id="topbar-placeholder"></div>

    <main>
        <div class="dashboard-wrapper">
            <div id="sidebar-placeholder"></div>
            
            <div class="dashboard-content">
                <h2 class="section-header">Saved Items</h2>
                <div class="wishlist-grid" id="wishlist-container">
                    <p style="text-align: center; width: 100%; grid-column: 1 / -1;"><i class="fas fa-circle-notch fa-spin"></i> Loading saved items...</p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script/topbar/topbar.js"></script>
    <script src="script/footer/footer.js"></script>
    <script src="script/custom-diloague.js"></script>
    <script type="module">
        import { app, auth } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
        import { initSidebar } from "./script/sidebar-das/sidebar-das.js";

        const db = getFirestore(app, "default");

        // Boot up Sidebar Nav
        initSidebar();

        async function fetchUserWishlist() {
            if (!auth.currentUser) return;
            const wishlistContainer = document.getElementById('wishlist-container');
            try {
                const q = query(collection(db, "wishlist"), where("userId", "==", auth.currentUser.uid));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    wishlistContainer.innerHTML = '<p style="text-align: center; width: 100%; grid-column: 1 / -1; color: #94a3b8;">No items saved to wishlist yet.</p>';
                    return;
                }

                let html = '';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    html += `
                        <div class="wishlist-card">
                            <img src="${data.imageUrl || 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&q=80'}" alt="${data.productName || 'Product'}" class="wishlist-img">
                            <div class="wishlist-info">
                                <h3 class="wishlist-title">${data.productName || 'Product Name'}</h3>
                                <p class="wishlist-price">$${(data.price || 0).toFixed(2)}</p>
                                <div class="wishlist-actions">
                                    <button class="btn-primary" onclick="console.log('Add to cart:', '${doc.id}')"><i class="fas fa-shopping-cart"></i> Add</button>
                                    <button class="btn-icon" onclick="console.log('Remove:', '${doc.id}')"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                wishlistContainer.innerHTML = html;
            } catch (error) {
                console.error("Error fetching wishlist:", error);
                wishlistContainer.innerHTML = '<p style="text-align: center; width: 100%; grid-column: 1 / -1; color: #ef4444;">Failed to load saved items.</p>';
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                fetchUserWishlist();
            } else {
                window.location.href = "login.html";
            }
        });

        // Handle manual Sidebar logout button inside the script
        setTimeout(() => {
            const logoutBtn = document.getElementById('logout-btn');
            if(logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    signOut(auth).then(() => {
                        if (window.showMessage) showMessage("Logged out successfully!", "success");
                        setTimeout(() => {
                            window.location.href = "login.html";
                        }, 1000);
                    }).catch(error => console.error("Logout Error:", error));
                });
            }
        }, 500);
    </script>
</body>
</html>
