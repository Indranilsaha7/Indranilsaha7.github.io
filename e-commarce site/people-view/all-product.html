<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="logo/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products | Baroda Shop1</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style/topbar/topbar.css">
    <link rel="stylesheet" href="style/footer/footer.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .page-header {
            text-align: center;
            padding: 4rem 0;
            margin-top: 80px;
            /* Offset for fixed topbar */
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.1), #0f172a 90%);
        }

        .page-header h1 {
            font-size: 3rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .page-header p {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding: 1.5rem;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .filter-group,
        .sort-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: #cbd5e1;
        }

        .controls-bar select,
        .controls-bar input {
            padding: 0.7rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #0f172a;
            color: white;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .controls-bar select:focus,
        .controls-bar input:focus {
            border-color: #818cf8;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            padding-bottom: 4rem;
        }

        .product-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            border-color: #818cf8;
        }

        .product-image {
            height: 200px;
            width: 100%;
            object-fit: cover;
            background-color: #0f172a;
        }

        .product-info {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-info h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.2rem;
            color: #f8fafc;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: 600;
            color: #c084fc;
            margin-bottom: 1rem;
        }

        .add-to-cart-btn {
            margin-top: auto;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
            border: none;
            cursor: pointer;
        }

        .add-to-cart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px -10px #4f46e5;
        }

        .product-card-placeholder {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4rem;
            border-radius: 20px;
            text-align: center;
            color: #94a3b8;
            grid-column: 1 / -1;
            font-size: 1.1rem;
        }

        /* Custom Cart Toggle Button */
        .custom-cart-btn {
            display: inline-flex;
            align-items: center;
            background: #1e293b;
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            height: 45px;
            width: 55px; /* Starts as a circle just for the logo */
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.1s, background 0.4s ease, box-shadow 0.4s ease;
        }
        .custom-cart-btn:hover {
            width: 160px;
            background: linear-gradient(to right, #3b82f6, #10b981); /* Blue to Green gradient */
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0s, background 0.4s ease, box-shadow 0.4s ease;
        }
        .custom-cart-btn .cart-icon {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.1rem;
            transition: left 0.4s ease 0.1s, transform 0.4s ease 0.1s;
        }
        .custom-cart-btn:hover .cart-icon {
            animation: cart-drift 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes cart-drift {
            0% { left: 50%; transform: translateX(-50%) rotate(0deg); }
            /* Revving back / popping wheelie */
            10% { left: 48%; transform: translateX(-50%) rotate(-12deg) translateY(-2px); }
            /* Traction hunting / tire slipping */
            15% { left: 46%; transform: translateX(-50%) rotate(-8deg) translateY(-1px); }
            20% { left: 47%; transform: translateX(-50%) rotate(-14deg) translateY(-3px); }
            25% { left: 45%; transform: translateX(-50%) rotate(-10deg) translateY(-2px); }
            /* The launch (leaning forward into the acceleration) */
            35% { left: 45%; transform: translateX(-50%) rotate(10deg) translateY(2px); }
            70% { left: calc(100% - 20px); transform: translateX(-50%) rotate(15deg) translateY(2px); }
            /* Hard braking / Settling at the end */
            85% { left: calc(100% - 35px); transform: translateX(-50%) rotate(-8deg) translateY(-1px); }
            100% { left: calc(100% - 30px); transform: translateX(-50%) rotate(0deg); } 
        }
        /* Smoke effect */
        .custom-cart-btn::before {
            content: '';
            position: absolute;
            bottom: 8px; /* Closer to where wheels would be */
            left: 45%;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%);
        }
        .custom-cart-btn:hover::before {
            animation: smoke-burnout 0.8s ease-out forwards;
        }
        @keyframes smoke-burnout {
            0% { opacity: 0; transform: translateX(-50%) scale(0.5); box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
            15% { opacity: 1; transform: translateX(-60%) scale(1); box-shadow: -8px -4px 10px rgba(255, 255, 255, 0.8), -4px -8px 12px rgba(255, 255, 255, 0.6); }
            35% { opacity: 0.9; transform: translateX(-100%) scale(2); box-shadow: -20px -8px 15px rgba(255, 255, 255, 0.7), -12px -15px 20px rgba(255, 255, 255, 0.5); }
            60% { opacity: 0.5; transform: translateX(-160%) scale(3.5); box-shadow: -35px -15px 25px rgba(255, 255, 255, 0.4), -20px -30px 30px rgba(255, 255, 255, 0.3), -45px 0px 20px rgba(255, 255, 255, 0.2); }
            100% { opacity: 0; transform: translateX(-250%) scale(5) translateY(-20px); box-shadow: -50px -25px 40px rgba(255, 255, 255, 0), -30px -40px 50px rgba(255, 255, 255, 0); }
        }
        .custom-cart-btn .cart-text {
            position: absolute;
            left: 20px;
            opacity: 0;
            white-space: nowrap;
            font-weight: 600;
            font-size: 0.95rem;
            transform: translateX(-20px);
            transition: opacity 0.15s ease 0s, transform 0.15s ease 0s;
        }
        .custom-cart-btn:hover .cart-text {
            opacity: 1;
            transform: translateX(0);
            transition: opacity 0.3s ease 0.3s, transform 0.3s ease 0.3s;
        }

        @media (max-width: 768px) {
            .controls-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>
    <div id="topbar-placeholder"></div>

    <main>
        <section class="page-header">
            <h1>All Products</h1>
            <p>Browse our complete collection of high-quality items.</p>
        </section>

        <section class="container">
            <div class="controls-bar">
                <div class="filter-group">
                    <label for="search-input"><i class="fas fa-search"></i></label>
                    <input type="text" id="search-input" placeholder="Search products...">
                </div>
                <div class="filter-group">
                    <label for="category-filter">Category:</label>
                    <select id="category-filter">
                        <option value="all">All</option>
                    </select>
                </div>
                <div class="sort-group">
                    <label for="sort-control">Sort by:</label>
                    <select id="sort-control">
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option>
                        <option value="price-asc">Price (Low to High)</option>
                        <option value="price-desc">Price (High to Low)</option>
                    </select>
                </div>
            </div>

            <div class="product-grid" id="all-products-container">
                <div class="product-card-placeholder">Loading products...</div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script/topbar/topbar.js"></script>
    <script src="script/footer/footer.js"></script>
    <script src="script/custom-diloague.js"></script>

    <script type="module">
        import { app } from "./firebase-config.js";
        import { getFirestore, collection, getDocs, query, orderBy, collectionGroup } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const db = getFirestore(app, "default");
        const productsContainer = document.getElementById('all-products-container');
        const categoryFilter = document.getElementById('category-filter');
        const sortControl = document.getElementById('sort-control');
        const searchInput = document.getElementById('search-input');

        let allProducts = [];

        function renderProducts(products) {
            productsContainer.innerHTML = '';

            if (products.length === 0) {
                productsContainer.innerHTML = `<div class="product-card-placeholder">No products found matching your criteria.</div>`;
                return;
            }

            products.forEach(product => {
                const price = product.price ? `$${product.price.toFixed(2)}` : 'Price not available';
                const imageUrl = product.imageUrl || 'https://via.placeholder.com/300x200/1e293b/94a3b8?text=No+Image';

                const card = `
                    <div class="product-card">
                        <img src="${imageUrl}" alt="${product.name}" class="product-image">
                        <div class="product-info">
                            <h3>${product.name || 'Unnamed Product'}</h3>
                            <p class="product-price">${price}</p>
                            <div style="display: flex; gap: 10px; margin-top: auto; align-items: center;">
                                <a href="product-details.html?id=${product.id}" class="add-to-cart-btn" style="flex-grow: 1; padding: 0.6rem 1rem; margin-top: 0;">View Details</a>
                                <button class="custom-cart-btn" onclick="event.preventDefault(); addToCart('${product.id}')" title="Add to Cart">
                                    <span class="cart-text">Add to Cart</span>
                                    <i class="fa-solid fa-cart-shopping cart-icon"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                productsContainer.insertAdjacentHTML('beforeend', card);
            });
        }

        function applyFiltersAndSort() {
            let filteredProducts = [...allProducts];
            const category = categoryFilter.value;
            if (category !== 'all') {
                filteredProducts = filteredProducts.filter(p => p.category === category);
            }

            const searchTerm = searchInput.value.toLowerCase();
            if (searchTerm) {
                filteredProducts = filteredProducts.filter(p => p.name && p.name.toLowerCase().includes(searchTerm));
            }

            const sortBy = sortControl.value;
            switch (sortBy) {
                case 'price-asc':
                    filteredProducts.sort((a, b) => (a.price || 0) - (b.price || 0));
                    break;
                case 'price-desc':
                    filteredProducts.sort((a, b) => (b.price || 0) - (a.price || 0));
                    break;
                case 'name-asc':
                    filteredProducts.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                    break;
                case 'name-desc':
                    filteredProducts.sort((a, b) => (b.name || '').localeCompare(a.name || ''));
                    break;
            }

            renderProducts(filteredProducts);
        }

        // Global Add to Cart function for the all products grid
        window.addToCart = function(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;
            
            let cart = JSON.parse(localStorage.getItem('baroda_cart') || '[]');
            const existingItem = cart.find(item => item.id === product.id);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                const price = Number(product.sellPrice != null ? product.sellPrice : (product.price || 0));
                cart.push({
                    id: product.id,
                    name: product.name || 'Unnamed Product',
                    price: price,
                    imageUrl: product.imageUrl || 'https://via.placeholder.com/80x80/1e293b/94a3b8?text=No+Image',
                    quantity: 1
                });
            }
            localStorage.setItem('baroda_cart', JSON.stringify(cart));

            if (window.showMessage) {
                showMessage("Product added to your cart successfully!", "success");
            } else {
                alert("Added to cart!");
            }
        };

        async function fetchAllProducts() {
            productsContainer.innerHTML = `<div class="product-card-placeholder"><i class="fas fa-circle-notch fa-spin"></i> Loading products...</div>`;
            try {
                // Use collectionGroup to query all 'products' subcollections across all 'shops'
                const productsColl = collectionGroup(db, "products");
                const q = query(productsColl); // Removed initial orderBy to avoid needing a composite index
                const productSnapshot = await getDocs(q);

                allProducts = productSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                const categories = [...new Set(allProducts.map(p => p.category))].filter(Boolean);
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                    categoryFilter.appendChild(option);
                });

                applyFiltersAndSort();

            } catch (error) {
                console.error("Error fetching products:", error);
                productsContainer.innerHTML = `<div class="product-card-placeholder">Error loading products. Please try again later.</div>`;
            }
        }

        categoryFilter.addEventListener('change', applyFiltersAndSort);
        sortControl.addEventListener('change', applyFiltersAndSort);
        searchInput.addEventListener('input', applyFiltersAndSort);

        fetchAllProducts();
    </script>
</body>

</html>
