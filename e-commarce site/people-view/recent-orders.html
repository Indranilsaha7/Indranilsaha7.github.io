<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="logo/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recent Orders | Baroda Shop1</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Link to Component Styles -->
    <link rel="stylesheet" href="style/topbar/topbar.css">
    <link rel="stylesheet" href="style/footer/footer.css">
    <link rel="stylesheet" href="style/sidebar-dash/sidebar-das.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex-grow: 1;
            padding: 6rem 2rem 2rem 2rem; /* padding top offset for fixed topbar */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dashboard-wrapper {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            .dashboard-wrapper {
                grid-template-columns: 1fr;
            }
        }
        .dashboard-content {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            min-height: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .section-header {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Local CSS specifically isolated for the Orders Table */
        .table-responsive {
            overflow-x: auto;
        }
        .orders-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .orders-table th, .orders-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .orders-table th {
            color: #94a3b8;
            font-weight: 500;
        }
        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-processing { background: rgba(234, 179, 8, 0.2); color: #eab308; }
        .status-shipped { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .status-delivered { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    </style>
</head>

<body>
    <div id="topbar-placeholder"></div>

    <main>
        <div class="dashboard-wrapper">
            <div id="sidebar-placeholder"></div>
            
            <div class="dashboard-content">
                <h2 class="section-header">Recent Orders</h2>
                <div class="table-responsive">
                    <table class="orders-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Date</th>
                                <th>Total</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="orders-list">
                            <tr><td colspan="4" style="text-align: center;">Loading orders...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script/topbar/topbar.js"></script>
    <script src="script/footer/footer.js"></script>
    <script src="script/custom-diloague.js"></script>
    <script type="module">
        import { app, auth } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
        import { initSidebar } from "./script/sidebar-das/sidebar-das.js";

        const db = getFirestore(app, "default");

        // Boot up Sidebar Nav
        initSidebar(); 

        // Fetch Orders Data
        async function fetchUserOrders() {
            if (!auth.currentUser) return;
            const ordersList = document.getElementById('orders-list');
            try {
                const q = query(collection(db, "orders"), where("userId", "==", auth.currentUser.uid));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    ordersList.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #94a3b8;">No recent orders found.</td></tr>';
                    return;
                }

                let html = '';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString() : 'N/A';
                    const statusClass = data.status === 'Processing' ? 'status-processing' : data.status === 'Shipped' ? 'status-shipped' : 'status-delivered';
                    html += `
                        <tr>
                            <td>#${doc.id.substring(0, 8).toUpperCase()}</td>
                            <td>${date}</td>
                            <td>$${(data.totalAmount || 0).toFixed(2)}</td>
                            <td><span class="status-badge ${statusClass}">${data.status || 'Pending'}</span></td>
                        </tr>
                    `;
                });
                ordersList.innerHTML = html;
            } catch (error) {
                console.error("Error fetching orders:", error);
                ordersList.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #ef4444;">Failed to load orders.</td></tr>';
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                fetchUserOrders();
            } else {
                window.location.href = "login.html";
            }
        });

        // Handle manual Sidebar logout button inside the new script
        setTimeout(() => {
            const logoutBtn = document.getElementById('logout-btn');
            if(logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    signOut(auth).then(() => {
                        if (window.showMessage) showMessage("Logged out successfully!", "success");
                        setTimeout(() => {
                            window.location.href = "login.html";
                        }, 1000);
                    }).catch(error => console.error("Logout Error:", error));
                });
            }
        }, 500);
    </script>
</body>
</html>
