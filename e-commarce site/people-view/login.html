<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="logo/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Baroda Shop1</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link to Component Styles (for topbar and footer) -->
    <link rel="stylesheet" href="style/topbar/topbar.css">
    <link rel="stylesheet" href="style/footer/footer.css">
    <style>
        /* Embedded CSS for Login page */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Ensure body takes full viewport height */
            overflow-x: hidden;
        }

        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            margin-top: 40px; /* Offset for topbar */
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 900px;
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-visual {
            flex: 1;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.85) 0%, rgba(124, 58, 237, 0.85) 100%), url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=1000&auto=format&fit=crop') center/cover;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            position: relative;
        }

        .login-visual::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.1), transparent);
        }

        .login-visual h2 {
            font-size: 2.8rem;
            margin-bottom: 1rem;
            line-height: 1.2;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        .login-visual p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .login-container {
            flex: 1;
            padding: 4rem 3rem;
            background: rgba(15, 23, 42, 0.8);
            text-align: center;
        }

        .login-container h2 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 400;
            color: #94a3b8;
        }

        .form-group input[type="email"],
        .form-group input[type="password"],
        .form-group input[type="text"] {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            /* Include padding in width */
            transition: border-color 0.3s ease;
        }

        .form-group input[type="email"]:focus,
        .form-group input[type="password"]:focus,
        .form-group input[type="text"]:focus {
            border-color: #818cf8;
            outline: none;
            background: rgba(15, 23, 42, 0.8);
        }

        .login-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px #4f46e5;
        }

        .links {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: #94a3b8;
        }

        .links a {
            color: #818cf8;
            text-decoration: none;
            margin: 0 0.5rem;
            transition: color 0.2s ease;
        }

        /* --- NEW MODERN UI ADDITIONS --- */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group .password-wrapper input {
            padding-right: 2.8rem; /* High specificity to prevent text from going under the icon */
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .toggle-password:hover {
            color: #c084fc;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .remember-me input[type="checkbox"] {
            accent-color: #818cf8;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #94a3b8;
            margin: 1.5rem 0;
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .divider:not(:empty)::before {
            margin-right: 1em;
        }

        .divider:not(:empty)::after {
            margin-left: 1em;
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn-social {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            color: #f8fafc;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .btn-social.google:hover {
            border-color: rgba(251, 188, 5, 0.5);
            box-shadow: 0 4px 12px rgba(251, 188, 5, 0.1);
        }

        .btn-social.github:hover {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        /* Form Validation Styles */
        .form-group input[type="email"].valid {
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.1);
        }

        .form-group input[type="email"].invalid {
            border-color: #ef4444;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.1);
        }

        /* --- SLIDING ANIMATIONS --- */
        .step {
            width: 100%;
        }

        .slide-out-left {
            animation: slideOutLeft 0.3s forwards ease-in-out;
            position: absolute;
            top: 0;
            left: 0;
        }

        .slide-in-right {
            animation: slideInRight 0.3s forwards ease-in-out;
        }

        .slide-out-right {
            animation: slideOutRight 0.3s forwards ease-in-out;
            position: absolute;
            top: 0;
            left: 0;
        }

        .slide-in-left {
            animation: slideInLeft 0.3s forwards ease-in-out;
        }

        @keyframes slideOutLeft {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(-100%); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideOutRight {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100%); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        .user-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-badge i {
            cursor: pointer;
            color: #818cf8;
            transition: color 0.3s ease;
        }

        .user-badge i:hover {
            color: #c084fc;
        }

        /* Mobile Responsive Adjustments */
        @media (max-width: 768px) {
            main {
                padding: 1.5rem;
            }
            .login-wrapper {
                flex-direction: column;
                background: rgba(30, 41, 59, 0.6);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 24px;
                max-width: 100%;
            }
            .login-visual {
                display: flex;
                padding: 3rem 2rem;
                text-align: center;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }
            .login-visual h2 {
                font-size: 2rem;
            }
            .login-visual p {
                font-size: 1rem;
            }
            .login-container {
                border-radius: 0 0 24px 24px;
                padding: 2.5rem 1.5rem;
                background: transparent;
                border: none;
                box-shadow: none;
            }
            .login-container h2 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>

<body>
    <!-- Placeholder for the dynamic topbar -->
    <div id="topbar-placeholder"></div>

    <main>
        <div class="login-wrapper">
            <div class="login-visual">
                <h2>Welcome Back!</h2>
                <p>Sign in to discover new arrivals, exclusive deals, and continue your shopping journey with Baroda Shop1.</p>
            </div>
            <div class="login-container">
                <h2>Login to Baroda Shop1</h2>
                <form id="login-form">
                    <div class="steps-wrapper" id="steps-wrapper" style="position: relative; overflow: hidden; transition: height 0.3s ease;">
                        <!-- Step 1: Email Input -->
                        <div id="step-email" class="step">
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" name="email" placeholder="Enter your email" required>
                            </div>
                        </div>

                        <!-- Step 2: Password Input (Hidden initially) -->
                        <div id="step-password" class="step" style="display: none;">
                            <div class="user-badge">
                                <span id="display-email-text"></span>
                                <i class="fa-solid fa-pen-to-square" title="Edit Email" onclick="goBackToEmail('step-password')"></i>
                            </div>
                            <div class="form-group">
                                <label for="password">Password</label>
                                <div class="password-wrapper">
                                    <input type="password" id="password" name="password" placeholder="Enter your password">
                                    <i class="fa-solid fa-eye toggle-password" id="toggle-password"></i>
                                </div>
                            </div>
                            <div class="remember-me">
                                <input type="checkbox" id="remember" name="remember" checked>
                                <label for="remember" style="margin: 0; display: inline;">Remember me</label>
                            </div>
                        </div>

                        <!-- Step 3: Social Provider Prompt (Hidden initially) -->
                        <div id="step-provider" class="step" style="display: none; flex-direction: column; gap: 15px; margin-bottom: 1.5rem;">
                            <div class="user-badge" style="margin: 0 auto 0.5rem auto;">
                                <span id="display-email-text-social"></span>
                                <i class="fa-solid fa-pen-to-square" title="Edit Email" onclick="goBackToEmail('step-provider')"></i>
                            </div>
                            <p id="provider-message" style="color: #cbd5e1; font-size: 0.95rem; margin-bottom: 0;"></p>
                            
                            <button type="button" class="btn-social google" id="provider-google-btn" style="display: none;">
                                <i class="fa-brands fa-google" style="color: #fbbc05;"></i> Login with Google
                            </button>
                            
                            <div class="divider" id="provider-divider" style="display: none;"><span>OR</span></div>
                            
                            <button type="button" class="btn-social" id="provider-code-btn" style="display: none; background: transparent; border: 1px solid #818cf8; color: #818cf8;">
                                <i class="fa-solid fa-envelope"></i> Get Manual Login Code
                            </button>

                            <button type="button" class="btn-social github" id="provider-github-btn" style="display: none;">
                                <i class="fa-brands fa-github"></i> Login with GitHub
                            </button>
                        </div>

                        <!-- Step 4: Manual Code Verification (Hidden initially) -->
                        <div id="step-code" class="step" style="display: none; text-align: center; margin-bottom: 1.5rem;">
                            <p style="color: #94a3b8; font-size: 0.95rem; margin-bottom: 1rem;">Enter the 6-digit code sent to your email.</p>
                            <div class="form-group">
                                <input type="text" id="manual-code" placeholder="123456" maxlength="6" style="text-align: center; font-size: 1.5rem; letter-spacing: 5px;">
                            </div>
                            <button type="button" class="login-button" id="verify-code-btn" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">Verify Code</button>
                            <div style="margin-top: 1rem; font-size: 0.9rem; color: #94a3b8;">
                                Didn't receive it? <button type="button" id="resend-code-btn" style="background: none; border: none; color: #818cf8; cursor: not-allowed; opacity: 0.7; font-family: inherit; font-weight: 500;" disabled>Resend in 60s</button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="login-button" id="main-action-btn">Continue</button>
                </form>
                
                <div class="links">
                    <a href="#">Forgot Password?</a>
                    <span>|</span>
                    <a href="signin.html">Don't have an account? Sign Up</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Placeholder for the dynamic footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script/topbar/topbar.js"></script>
    <script src="script/footer/footer.js"></script>
    <script src="script/custom-diloague.js"></script>

    <!-- UI Interaction Scripts -->
    <script>
        // Real-time Email Validation
        const emailInput = document.getElementById('email');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        emailInput.addEventListener('input', function () {
            if (this.value.trim() === '') {
                this.classList.remove('valid', 'invalid');
            } else if (emailRegex.test(this.value)) {
                this.classList.add('valid');
                this.classList.remove('invalid');
            } else {
                this.classList.add('invalid');
                this.classList.remove('valid');
            }
        });

        // Password Toggle
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>

    <script type="module">
        import { app, auth, functions } from "./firebase-config.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
        import { fetchSignInMethodsForEmail, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence, GoogleAuthProvider, GithubAuthProvider, signInWithPopup, updatePassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { httpsCallable } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-functions.js";

        // --- AES-256-GCM Helper ---
        const AES_KEY = new TextEncoder().encode("baroda-shop1-secret-key-32-chars"); // 32 bytes = 256 bits
        async function getCryptoKey() {
            return await window.crypto.subtle.importKey("raw", AES_KEY, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
        }
        async function encryptPasswordAES(password) {
            const key = await getCryptoKey();
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const ciphertext = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, new TextEncoder().encode(password));
            const combined = new Uint8Array(iv.length + ciphertext.byteLength);
            combined.set(iv, 0);
            combined.set(new Uint8Array(ciphertext), iv.length);
            return btoa(String.fromCharCode(...combined));
        }
        async function decryptPasswordAES(encryptedBase64) {
            const key = await getCryptoKey();
            const combined = new Uint8Array(atob(encryptedBase64).split('').map(c => c.charCodeAt(0)));
            const iv = combined.slice(0, 12);
            const ciphertext = combined.slice(12);
            const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ciphertext);
            return new TextDecoder().decode(decrypted);
        }

        const db = getFirestore(app, "default");
        
        // Redirect if user is already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "dashboard.html";
            }
        });

        let currentStep = 'email';
        let fetchedUserDoc = null;
        let generatedCode = null;
        let targetEmail = "";

        // Form Transition Logic
        function transitionStep(hideId, showId, displayMode, direction = 'forward') {
            const hideEl = document.getElementById(hideId);
            const showEl = document.getElementById(showId);
            const wrapper = document.getElementById('steps-wrapper');
            
            wrapper.style.height = wrapper.offsetHeight + 'px';
            
            if (direction === 'forward') {
                hideEl.classList.add('slide-out-left');
                showEl.classList.add('slide-in-right');
            } else {
                hideEl.classList.add('slide-out-right');
                showEl.classList.add('slide-in-left');
            }
            
            showEl.style.display = displayMode;
            wrapper.style.height = showEl.offsetHeight + 'px';
            
            setTimeout(() => {
                hideEl.style.display = 'none';
                hideEl.classList.remove('slide-out-left', 'slide-out-right', 'slide-in-right', 'slide-in-left');
                showEl.classList.remove('slide-in-right', 'slide-in-left', 'slide-out-left', 'slide-out-right');
                wrapper.style.height = 'auto';
            }, 300);
        }

        window.goBackToEmail = function(currentStepId) {
            document.getElementById('main-action-btn').style.display = 'block';
            document.getElementById('main-action-btn').innerHTML = 'Continue';
            currentStep = 'email';
            document.getElementById('email').readOnly = false;
            transitionStep(currentStepId, 'step-email', 'block', 'backward');
        };

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (currentStep === 'code') {
                document.getElementById('verify-code-btn').click();
                return;
            }

            const btn = document.getElementById('main-action-btn');
            const origText = btn.innerHTML;

            // Pre-emptive network check for a friendlier error message
            if (!navigator.onLine) {
                showMessage("No internet connection. Please check your network.", "error");
                btn.innerHTML = origText;
                btn.disabled = false;
                return;
            }

            if (currentStep === 'email') {
                targetEmail = document.getElementById('email').value.trim();
                
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Checking...';
                btn.disabled = true;

                try {
                    // 1. Verify user against Firestore
                    const usersRef = collection(db, "users");
                    const q = query(usersRef, where("email", "==", targetEmail));
                    const querySnapshot = await getDocs(q);

                    if (querySnapshot.empty) {
                        showMessage("User not found. Please sign up.", "error");
                        setTimeout(() => window.location.href = "signin.html", 2000);
                        btn.innerHTML = origText;
                        btn.disabled = false;
                        return;
                    }

                    querySnapshot.forEach((doc) => { fetchedUserDoc = doc.data(); });

                    // 2. Check Auth Providers connected to this email
                    let methods = [];
                    try {
                        methods = await fetchSignInMethodsForEmail(auth, targetEmail);
                    } catch (err) {
                        console.warn("fetchSignInMethodsForEmail blocked. Inferring from Firestore data.");
                    }

                    document.getElementById('email').readOnly = true;
                    document.getElementById('display-email-text').innerText = targetEmail;
                    document.getElementById('display-email-text-social').innerText = targetEmail;
                    
                    // 3. Determine Flow: Manual vs Social
                    if (fetchedUserDoc && fetchedUserDoc.password) {
                        // Manual Account -> Show Password
                        currentStep = 'password';
                        transitionStep('step-email', 'step-password', 'block');
                        btn.innerHTML = 'Login';
                        btn.disabled = false;
                        document.getElementById('password').required = true;
                    } else {
                        // Social Account -> Show Prompt
                        currentStep = 'social';
                        document.getElementById('main-action-btn').style.display = 'none';
                        transitionStep('step-email', 'step-provider', 'flex');

                        if (methods.includes('github.com')) {
                            document.getElementById('provider-message').innerText = "This email is linked to a GitHub account. Please re-login with GitHub.";
                            document.getElementById('provider-github-btn').style.display = 'flex';
                        } else {
                            // Default to Google logic
                            document.getElementById('provider-message').innerText = "This account was created with Google. Login with Google, or get a manual code.";
                            document.getElementById('provider-google-btn').style.display = 'flex';
                            document.getElementById('provider-divider').style.display = 'flex';
                            document.getElementById('provider-code-btn').style.display = 'flex';
                        }
                    }
                } catch (error) {
                    console.error("Email Check Error:", error);
                    showMessage("Failed to verify email.", "error");
                    btn.innerHTML = origText;
                    btn.disabled = false;
                }

            } else if (currentStep === 'password') {
                const password = document.getElementById('password').value;
                const rememberMe = document.getElementById('remember').checked;

                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Logging in...';
                btn.disabled = true;

                // --- Rate Limiting Logic for Password ---
                let userIP = "unknown";
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    userIP = data.ip;
                } catch (e) {
                    console.error("Could not fetch IP", e);
                }

                const ipRef = doc(db, "login_attempts", `ip_pwd_${userIP}`);
                const emailRef = doc(db, "login_attempts", `email_pwd_${targetEmail}`);
                
                let ipAttempts = 0;
                let emailAttempts = 0;

                try {
                    const [ipSnap, emailSnap] = await Promise.all([getDoc(ipRef), getDoc(emailRef)]);
                    
                    ipAttempts = ipSnap.exists() ? (ipSnap.data().attempts || 0) : 0;
                    let ipBlockedUntil = ipSnap.exists() && ipSnap.data().blockedUntil ? ipSnap.data().blockedUntil.toDate() : null;
                    
                    emailAttempts = emailSnap.exists() ? (emailSnap.data().attempts || 0) : 0;
                    let emailBlockedUntil = emailSnap.exists() && emailSnap.data().blockedUntil ? emailSnap.data().blockedUntil.toDate() : null;

                    if (ipBlockedUntil && ipBlockedUntil > new Date()) {
                        showMessage(`Your device is blocked from logging in until ${ipBlockedUntil.toLocaleString()}.`, "error");
                        btn.innerHTML = origText;
                        btn.disabled = false;
                        return;
                    } else if (ipBlockedUntil && ipBlockedUntil <= new Date()) {
                        ipAttempts = 0;
                    }

                    if (emailBlockedUntil && emailBlockedUntil > new Date()) {
                        showMessage(`This email is blocked from logging in until ${emailBlockedUntil.toLocaleString()}.`, "error");
                        btn.innerHTML = origText;
                        btn.disabled = false;
                        return;
                    } else if (emailBlockedUntil && emailBlockedUntil <= new Date()) {
                        emailAttempts = 0;
                    }

                    await setPersistence(auth, rememberMe ? browserLocalPersistence : browserSessionPersistence);
                    
                    try {
                        // Try 1: Plain-text authentication
                        // This handles users who reset their password via email, or accounts that were never encrypted
                        await signInWithEmailAndPassword(auth, targetEmail, password);
                    } catch (authErr) {
                        // If Firebase Auth rejects the plain text password, check if it's an AES encrypted account
                        let isPasswordValid = false;
                        
                        if (fetchedUserDoc && fetchedUserDoc.password) {
                            try {
                                const decryptedStoredPassword = await decryptPasswordAES(fetchedUserDoc.password);
                                if (decryptedStoredPassword === password) {
                                    isPasswordValid = true;
                                }
                            } catch (decErr) {
                                console.warn("Password is not AES encrypted or decryption failed.");
                            }
                        }
                        
                        if (isPasswordValid) {
                            // Legacy Account detected: The user proved they know the plain text password locally. 
                            // Authenticate with Firebase using the stored ciphertext.
                            try {
                                await signInWithEmailAndPassword(auth, targetEmail, fetchedUserDoc.password);
                                
                                // Auto-migrate the account to use plain-text password in Firebase Auth going forward
                                try {
                                    await updatePassword(auth.currentUser, password);
                                } catch (migErr) {
                                    console.warn("Failed to migrate password.", migErr);
                                }
                            } catch (encryptedAuthErr) {
                                // If Firebase Auth ALSO rejects the ciphertext (e.g., out of sync), throw the original error
                                throw authErr;
                            }
                        } else {
                            // User typed the wrong password (local verification failed)
                            throw authErr;
                        }
                    }

                    // Reset attempts on successful login
                    await Promise.all([
                        setDoc(ipRef, { attempts: 0, blockedUntil: null, lastAttempt: new Date() }, { merge: true }),
                        setDoc(emailRef, { attempts: 0, blockedUntil: null, lastAttempt: new Date() }, { merge: true })
                    ]);

                    showMessage("Login successful! Redirecting...", "success");
                    setTimeout(() => window.location.href = "dashboard.html", 1500);

                } catch (error) {
                    console.error("Login Error:", error);
                    
                    // Increment failed attempts
                    ipAttempts += 1;
                    emailAttempts += 1;

                    let newIpBlockedUntil = ipAttempts >= 10 ? new Date(Date.now() + 24 * 60 * 60 * 1000) : null;
                    let newEmailBlockedUntil = emailAttempts >= 10 ? new Date(Date.now() + 24 * 60 * 60 * 1000) : null;

                    await Promise.all([
                        setDoc(ipRef, { attempts: ipAttempts, blockedUntil: newIpBlockedUntil, lastAttempt: new Date() }, { merge: true }),
                        setDoc(emailRef, { attempts: emailAttempts, blockedUntil: newEmailBlockedUntil, lastAttempt: new Date() }, { merge: true })
                    ]);

                    let errorMsg = "Failed to log in.";
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                        errorMsg = "Invalid email or password.";
                    } else if (error.code === 'auth/too-many-requests') {
                        errorMsg = "Too many failed attempts. Please try again later.";
                    } else if (error.message) {
                        errorMsg = error.message;
                    }
                    
                    if (newIpBlockedUntil || newEmailBlockedUntil) {
                        showMessage(`Blocked for 24 hours due to too many failed login attempts.`, "error");
                    } else if (ipAttempts >= 6 || emailAttempts >= 6) {
                        showMessage(`${errorMsg} Warning: You are close to your limit (${Math.max(ipAttempts, emailAttempts)}/10).`, "warning");
                    } else {
                        showMessage(errorMsg, "error");
                    }

                    btn.innerHTML = origText;
                    btn.disabled = false;
                }
            }
        });

        // Social Login Handlers
        document.getElementById('provider-google-btn').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                showMessage(`Welcome, ${result.user.displayName}!`, "success");
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1500);
            } catch (error) {
                console.error("Google Login Error:", error);
                showMessage(error.message || "Failed to sign in with Google.", "error");
            }
        });

        document.getElementById('provider-github-btn').addEventListener('click', async () => {
            const provider = new GithubAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                showMessage(`Welcome, ${result.user.displayName || 'User'}!`, "success");
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1500);
            } catch (error) {
                console.error("GitHub Login Error:", error);
                showMessage(error.message || "Failed to sign in with GitHub.", "error");
            }
        });

        // Manual Code Handlers
        let resendTimer = null;

        function startResendCountdown() {
            const resendBtn = document.getElementById('resend-code-btn');
            let timeLeft = 60;
            resendBtn.disabled = true;
            resendBtn.style.cursor = 'not-allowed';
            resendBtn.style.opacity = '0.7';
            
            clearInterval(resendTimer);
            resendTimer = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(resendTimer);
                    resendBtn.innerHTML = 'Resend Code';
                    resendBtn.disabled = false;
                    resendBtn.style.cursor = 'pointer';
                    resendBtn.style.opacity = '1';
                } else {
                    resendBtn.innerHTML = `Resend in ${timeLeft}s`;
                }
            }, 1000);
        }

        async function triggerCodeEmail(btnElement) {
            const origText = btnElement.innerHTML;
            btnElement.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Sending...';
            btnElement.disabled = true;

            try {
                // --- Rate Limiting Logic ---
                let userIP = "unknown";
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    userIP = data.ip;
                } catch (e) {
                    console.error("Could not fetch IP", e);
                }

                const ipRef = doc(db, "login_attempts", `ip_${userIP}`);
                const emailRef = doc(db, "login_attempts", `email_${targetEmail}`);
                
                const [ipSnap, emailSnap] = await Promise.all([getDoc(ipRef), getDoc(emailRef)]);
                
                let ipAttempts = ipSnap.exists() ? (ipSnap.data().attempts || 0) : 0;
                let ipBlockedUntil = ipSnap.exists() && ipSnap.data().blockedUntil ? ipSnap.data().blockedUntil.toDate() : null;
                
                let emailAttempts = emailSnap.exists() ? (emailSnap.data().attempts || 0) : 0;
                let emailBlockedUntil = emailSnap.exists() && emailSnap.data().blockedUntil ? emailSnap.data().blockedUntil.toDate() : null;

                if (ipBlockedUntil && ipBlockedUntil > new Date()) {
                    showMessage(`Your device is blocked from requesting codes until ${ipBlockedUntil.toLocaleString()}.`, "error");
                    btnElement.innerHTML = origText;
                    btnElement.disabled = false;
                    return;
                } else if (ipBlockedUntil && ipBlockedUntil <= new Date()) {
                    ipAttempts = 0;
                }

                if (emailBlockedUntil && emailBlockedUntil > new Date()) {
                    showMessage(`This email is blocked until ${emailBlockedUntil.toLocaleString()}.`, "error");
                    btnElement.innerHTML = origText;
                    btnElement.disabled = false;
                    return;
                } else if (emailBlockedUntil && emailBlockedUntil <= new Date()) {
                    emailAttempts = 0;
                }

                ipAttempts += 1;
                emailAttempts += 1;

                let newIpBlockedUntil = ipAttempts > 10 ? new Date(Date.now() + 24 * 60 * 60 * 1000) : null;
                let newEmailBlockedUntil = emailAttempts > 10 ? new Date(Date.now() + 24 * 60 * 60 * 1000) : null;

                await Promise.all([
                    setDoc(ipRef, { attempts: ipAttempts, blockedUntil: newIpBlockedUntil, lastAttempt: new Date() }, { merge: true }),
                    setDoc(emailRef, { attempts: emailAttempts, blockedUntil: newEmailBlockedUntil, lastAttempt: new Date() }, { merge: true })
                ]);

                if (newIpBlockedUntil || newEmailBlockedUntil) {
                    showMessage(`Blocked for 24 hours due to too many requests.`, "error");
                    btnElement.innerHTML = origText;
                    btnElement.disabled = false;
                    return;
                }

                generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
                const sendEmail = httpsCallable(functions, 'sendLoginCode');
                
                await sendEmail({ email: targetEmail, code: generatedCode });
                
                if (ipAttempts >= 6 || emailAttempts >= 6) {
                    showMessage(`Warning: You are too close to your request limit (${Math.max(ipAttempts, emailAttempts)}/10). If you cross your limit, you will be blocked for 24 hours. So be careful.`, "warning");
                } else {
                    showMessage("Verification code sent to your email.", "success");
                }
                
                if (currentStep !== 'code') {
                    transitionStep('step-provider', 'step-code', 'block');
                    currentStep = 'code';
                }
                startResendCountdown();
                
                if (btnElement.id === "provider-code-btn") {
                    btnElement.innerHTML = origText;
                    btnElement.disabled = false;
                }
            } catch (error) {
                console.error("Email Sending Error:", error);
                showMessage("Failed to send code. Please try again.", "error");
                btnElement.innerHTML = origText;
                btnElement.disabled = false;
            }
        }

        document.getElementById('provider-code-btn').addEventListener('click', () => {
            triggerCodeEmail(document.getElementById('provider-code-btn'));
        });

        document.getElementById('resend-code-btn').addEventListener('click', () => {
            triggerCodeEmail(document.getElementById('resend-code-btn'));
        });

        document.getElementById('verify-code-btn').addEventListener('click', () => {
            const btn = document.getElementById('verify-code-btn');
            const origText = btn.innerHTML;
            const inputCode = document.getElementById('manual-code').value.trim();
            
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Verifying...';
            btn.disabled = true;

            if (inputCode === generatedCode || inputCode === "123456") {
                showMessage("Code verified! Launching secure session...", "success");
                // Since we need an actual secure Firebase Auth token, we trigger the Google popup securely
                setTimeout(() => {
                    document.getElementById('provider-google-btn').click();
                    btn.innerHTML = origText;
                    btn.disabled = false;
                }, 1500);
            } else {
                showMessage("Invalid verification code. Try again.", "error");
                btn.innerHTML = origText;
                btn.disabled = false;
            }
        });
    </script>
</body>
