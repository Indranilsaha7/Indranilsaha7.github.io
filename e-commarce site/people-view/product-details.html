<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="logo/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Baroda Shop1</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link to Component Styles -->
    <link rel="stylesheet" href="style/topbar/topbar.css">
    <link rel="stylesheet" href="style/footer/footer.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex-grow: 1;
            padding: 8rem 2rem 4rem 2rem; /* Adjusted for topbar */
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .loading {
            text-align: center;
            width: 100%;
            font-size: 1.2rem;
            color: #94a3b8;
            padding: 4rem 0;
        }

        .product-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-image-container {
            border-radius: 16px;
            overflow: hidden;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .product-image {
            width: 100%;
            height: auto;
            object-fit: cover;
            border-radius: 16px;
        }

        .product-info {
            display: flex;
            flex-direction: column;
        }

        .product-brand {
            color: #818cf8;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .product-info h1 {
            font-size: 2.5rem;
            margin: 0 0 1rem 0;
            color: #f8fafc;
            line-height: 1.2;
        }

        .product-price {
            font-size: 2.5rem;
            color: #c084fc;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .product-desc {
            color: #cbd5e1;
            line-height: 1.8;
            font-size: 1.05rem;
            margin-bottom: 2rem;
        }

        /* Custom Animated Cart Toggle Button */
        .custom-cart-btn {
            display: inline-flex;
            align-items: center;
            background: #1e293b;
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            height: 50px;
            width: 60px; /* Starts as a circle just for the logo */
            position: relative;
            cursor: pointer;
            margin-top: auto;
            overflow: hidden;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.1s, background 0.4s ease, box-shadow 0.4s ease;
        }
        .custom-cart-btn:hover {
            width: 170px;
            background: linear-gradient(to right, #3b82f6, #10b981); /* Blue to Green gradient */
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0s, background 0.4s ease, box-shadow 0.4s ease;
        }
        .custom-cart-btn .cart-icon {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            transition: left 0.4s ease 0.1s, transform 0.4s ease 0.1s;
        }
        .custom-cart-btn:hover .cart-icon {
            animation: cart-drift-details 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes cart-drift-details {
            0% { left: 50%; transform: translateX(-50%) rotate(0deg); }
            /* Revving back / popping wheelie */
            10% { left: 48%; transform: translateX(-50%) rotate(-12deg) translateY(-2px); }
            /* Traction hunting / tire slipping */
            15% { left: 46%; transform: translateX(-50%) rotate(-8deg) translateY(-1px); }
            20% { left: 47%; transform: translateX(-50%) rotate(-14deg) translateY(-3px); }
            25% { left: 45%; transform: translateX(-50%) rotate(-10deg) translateY(-2px); }
            /* The launch (leaning forward into the acceleration) */
            35% { left: 45%; transform: translateX(-50%) rotate(10deg) translateY(2px); }
            70% { left: calc(100% - 25px); transform: translateX(-50%) rotate(15deg) translateY(2px); }
            /* Hard braking / Settling at the end */
            85% { left: calc(100% - 40px); transform: translateX(-50%) rotate(-8deg) translateY(-1px); }
            100% { left: calc(100% - 35px); transform: translateX(-50%) rotate(0deg); } 
        }
        /* Smoke effect */
        .custom-cart-btn::before {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 45%;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%);
        }
        .custom-cart-btn:hover::before {
            animation: smoke-burnout 0.8s ease-out forwards;
        }
        @keyframes smoke-burnout {
            0% { opacity: 0; transform: translateX(-50%) scale(0.5); box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
            15% { opacity: 1; transform: translateX(-60%) scale(1); box-shadow: -8px -4px 10px rgba(255, 255, 255, 0.8), -4px -8px 12px rgba(255, 255, 255, 0.6); }
            35% { opacity: 0.9; transform: translateX(-100%) scale(2); box-shadow: -20px -8px 15px rgba(255, 255, 255, 0.7), -12px -15px 20px rgba(255, 255, 255, 0.5); }
            60% { opacity: 0.5; transform: translateX(-160%) scale(3.5); box-shadow: -35px -15px 25px rgba(255, 255, 255, 0.4), -20px -30px 30px rgba(255, 255, 255, 0.3), -45px 0px 20px rgba(255, 255, 255, 0.2); }
            100% { opacity: 0; transform: translateX(-250%) scale(5) translateY(-20px); box-shadow: -50px -25px 40px rgba(255, 255, 255, 0), -30px -40px 50px rgba(255, 255, 255, 0); }
        }
        .custom-cart-btn .cart-text {
            position: absolute;
            left: 20px;
            opacity: 0;
            white-space: nowrap;
            font-weight: 600;
            font-size: 1rem;
            transform: translateX(-20px);
            transition: opacity 0.15s ease 0s, transform 0.15s ease 0s;
        }
        .custom-cart-btn:hover .cart-text {
            opacity: 1;
            transform: translateX(0);
            transition: opacity 0.3s ease 0.3s, transform 0.3s ease 0.3s;
        }

        .meta-tags {
            margin-top: 2rem;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(129, 140, 248, 0.1);
            color: #818cf8;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .product-wrapper {
                grid-template-columns: 1fr;
                padding: 1.5rem;
                gap: 2rem;
            }
            .product-info h1 {
                font-size: 2rem;
            }
            main {
                padding-top: 6rem;
            }
        }
    </style>
</head>

<body>
    <div id="topbar-placeholder"></div>

    <main>
        <div class="container">
            <!-- State Handlers -->
            <div id="loading-state" class="loading"><i class="fas fa-circle-notch fa-spin"></i> Loading product details...</div>
            <div id="error-state" class="loading" style="display: none; color: #ef4444;"></div>

            <!-- Static Product Structure to be populated dynamically -->
            <div class="product-wrapper" id="product-content" style="display: none;">
                <div class="product-image-container">
                    <img id="product-image" src="" alt="Product Image" class="product-image">
                </div>
                <div class="product-info">
                    <div class="product-brand" id="product-brand"></div>
                    <h1 id="product-title"></h1>
                    <div class="product-price" id="product-price"></div>
                    
                    <div style="margin-bottom: 1.5rem; display: flex; gap: 10px;">
                        <span style="color: #94a3b8; font-size: 0.95rem;">Category: </span>
                        <span style="color: #f8fafc; font-weight: 500; font-size: 0.95rem;" id="product-category"></span>
                    </div>
                    
                    <div class="product-desc" id="product-desc"></div>
                    
                    <button class="custom-cart-btn" id="add-to-cart-btn">
                        <span class="cart-text">Add to Cart</span>
                        <i class="fa-solid fa-cart-shopping cart-icon"></i>
                    </button>
                    
                    <div class="meta-tags" id="product-tags"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script/topbar/topbar.js"></script>
    <script src="script/footer/footer.js"></script>
    <script src="script/custom-diloague.js"></script>

    <script type="module">
        import { app } from "./firebase-config.js";
        import { getFirestore, collectionGroup, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const db = getFirestore(app, "default");

        // Fetch product ID from URL query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        // Select DOM Elements
        const loadingState = document.getElementById('loading-state');
        const errorState = document.getElementById('error-state');
        const productContent = document.getElementById('product-content');
        
        const productTitle = document.getElementById('product-title');
        const productImage = document.getElementById('product-image');
        const productPrice = document.getElementById('product-price');
        const productCategory = document.getElementById('product-category');
        const productDesc = document.getElementById('product-desc');
        const productBrand = document.getElementById('product-brand');
        const productTags = document.getElementById('product-tags');
        const addToCartBtn = document.getElementById('add-to-cart-btn');

        async function fetchProductDetails() {
            if (!productId) {
                showError('Product ID is missing in the URL! Return to <a href="all-product.html" style="color:#818cf8;">All Products</a>.');
                return;
            }

            try {
                // Fetch using collectionGroup to support both root and subcollection products
                const productsRef = collectionGroup(db, "products");
                const querySnapshot = await getDocs(productsRef);
                let productData = null;

                querySnapshot.forEach((doc) => {
                    if (doc.id === productId) {
                        productData = { id: doc.id, ...doc.data() };
                    }
                });

                if (!productData) {
                    showError('Product not found! Return to <a href="all-product.html" style="color:#818cf8;">All Products</a>.');
                    return;
                }

                // Update DOM elements with Firestore data
                document.title = `${productData.name} | Baroda Shop1`;
                
                productTitle.textContent = productData.name || 'Unnamed Product';
                productImage.src = productData.imageUrl || 'https://via.placeholder.com/600x600/1e293b/94a3b8?text=No+Image';
                productImage.alt = productData.name || 'Product Image';
                
                productPrice.textContent = productData.sellPrice != null
                    ? `$${Number(productData.sellPrice).toFixed(2)}` 
                    : (productData.price != null ? `$${Number(productData.price).toFixed(2)}` : 'Price not available');
                
                productCategory.textContent = (productData.category || 'General').toUpperCase();
                productBrand.textContent = productData.brand || 'Baroda Shop1';
                
                productDesc.innerHTML = (productData.description || 'No description available.').replace(/\n/g, '<br>');

                if (productData.searchTags && Array.isArray(productData.searchTags) && productData.searchTags.length > 0) {
                    productTags.innerHTML = productData.searchTags.map(tag => `<span class="tag">#${tag}</span>`).join('');
                } else {
                    productTags.innerHTML = '';
                }

                // Attach Cart Event Listener safely without polluting global scope
                addToCartBtn.addEventListener('click', () => addToCart(productData));

                // Toggle visibility: Hide loading message and show product elements
                loadingState.style.display = 'none';
                productContent.style.display = 'grid';

            } catch (error) {
                console.error("Error fetching product details:", error);
                showError('Failed to load product details. Please try again later.');
            }
        }

        function showError(message) {
            loadingState.style.display = 'none';
            errorState.innerHTML = message;
            errorState.style.display = 'block';
            productContent.style.display = 'none';
        }

        // Cart Interaction Handler
        function addToCart(product) {
            let cart = JSON.parse(localStorage.getItem('baroda_cart') || '[]');
            const existingItem = cart.find(item => item.id === product.id);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                const price = Number(product.sellPrice != null ? product.sellPrice : (product.price || 0));
                cart.push({
                    id: product.id,
                    name: product.name || 'Unnamed Product',
                    price: price,
                    imageUrl: product.imageUrl || 'https://via.placeholder.com/80x80/1e293b/94a3b8?text=No+Image',
                    quantity: 1
                });
            }
            localStorage.setItem('baroda_cart', JSON.stringify(cart));

            if (window.showMessage) {
                showMessage(`${product.name || 'Product'} added to your cart successfully!`, "success");
            } else {
                alert("Added to cart!");
            }
        }

        // Execute fetch
        fetchProductDetails();
    </script>
</body>

</html>
