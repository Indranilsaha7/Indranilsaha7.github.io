<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="logo/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | Baroda Shop1</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Link to Component Styles -->
    <link rel="stylesheet" href="style/topbar/topbar.css">
    <link rel="stylesheet" href="style/footer/footer.css">
    <link rel="stylesheet" href="style/sidebar-dash/sidebar-das.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex-grow: 1;
            padding: 6rem 2rem 2rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dashboard-wrapper {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            .dashboard-wrapper {
                grid-template-columns: 1fr;
            }
        }
        .dashboard-content {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            min-height: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .section-header {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Local CSS specifically isolated for Settings Form */
        .settings-form {
            display: grid;
            gap: 1.5rem;
            max-width: 600px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group label {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .form-group input {
            padding: 0.9rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }
        .form-group input:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }
        .form-actions {
            margin-top: 1rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px -5px #4f46e5;
        }
    </style>
</head>

<body>
    <div id="topbar-placeholder"></div>

    <main>
        <div class="dashboard-wrapper">
            <div id="sidebar-placeholder"></div>
            
            <div class="dashboard-content">
                <h2 class="section-header">Account Settings</h2>
                <form class="settings-form" id="settings-form">
                    <div class="form-group">
                        <label for="edit-phone">Phone Number</label>
                        <input type="tel" id="edit-phone" placeholder="Loading...">
                    </div>
                    <div class="form-group">
                        <label for="edit-address">Default Delivery Address</label>
                        <input type="text" id="edit-address" placeholder="Loading...">
                    </div>
                    <div class="form-group" style="margin-top: 1rem;">
                        <label for="edit-password">New Password</label>
                        <input type="password" id="edit-password" placeholder="Leave blank to keep current password">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script/topbar/topbar.js"></script>
    <script src="script/footer/footer.js"></script>
    <script src="script/custom-diloague.js"></script>
    <script type="module">
        import { app, auth } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
        import { initSidebar } from "./script/sidebar-das/sidebar-das.js";

        const db = getFirestore(app, "default");

        // Boot up Sidebar Nav
        initSidebar();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDocRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(userDocRef);
                    if (docSnap.exists()) {
                        const userData = docSnap.data();
                        document.getElementById('edit-phone').value = userData.phone || '';
                        if (userData.location && userData.location.address) {
                            document.getElementById('edit-address').value = userData.location.address;
                        }
                    }
                } catch (error) {
                    console.error("Error fetching user data:", error);
                }
            } else {
                window.location.href = "login.html";
            }
        });

        document.getElementById('settings-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;
            
            const btn = document.querySelector('.btn-primary');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Saving...';
            btn.disabled = true;

            const newPhone = document.getElementById('edit-phone').value;
            const newAddress = document.getElementById('edit-address').value;
            // NOTE: Password updates require re-authentication in Firebase Auth, leaving blank for Firestore update
            
            try {
                const userRef = doc(db, "users", auth.currentUser.uid);
                await updateDoc(userRef, { 
                    phone: newPhone,
                    "location.address": newAddress 
                });
                
                if (window.showMessage) {
                    showMessage("Profile details updated successfully!", "success");
                } else {
                    alert("Profile updated successfully!");
                }
            } catch (error) {
                console.error("Error updating profile:", error);
                if (window.showMessage) {
                    showMessage("Failed to update profile data.", "error");
                } else {
                    alert("Failed to update profile.");
                }
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Handle manual Sidebar logout button inside the script
        setTimeout(() => {
            const logoutBtn = document.getElementById('logout-btn');
            if(logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    signOut(auth).then(() => {
                        if (window.showMessage) showMessage("Logged out successfully!", "success");
                        setTimeout(() => {
                            window.location.href = "login.html";
                        }, 1000);
                    }).catch(error => console.error("Logout Error:", error));
                });
            }
        }, 500);
    </script>
</body>
</html>
