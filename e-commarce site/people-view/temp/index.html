<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page under construction | Baroda Shop1 | BCSDevloper team</title>
    <link rel="icon" type="image/png" href="logo/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
            background-color: #050505;
        }

        /* Background Setup */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Verified High-res mountain landscape */
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
            z-index: 1;
            /* Enhanced Dark overlay for better text contrast */
            box-shadow: inset 0 0 0 2000px rgba(10, 10, 15, 0.75);
        }

        /* Wrapper to sit above the background */
        .wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 2rem 4rem;
        }

        /* Header & Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ff4b4b; /* Brighter red for visibility */
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #f1f1f1;
            font-weight: 500;
            font-size: 1rem;
            transition: color 0.3s ease, transform 0.2s ease;
        }

        .nav-links a:hover {
            color: #ff4b4b;
            transform: translateY(-2px);
        }

        .menu-icon {
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        
        .menu-icon:hover {
            opacity: 0.7;
        }

        /* Main Content Alignment */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-top: -2vh;
        }

        /* Massive 404 Text with Floating Animation */
        .glitch-text {
            font-size: clamp(8rem, 15vw, 15rem); /* Responsive sizing */
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.05em;
            background: linear-gradient(180deg, #ffffff 0%, #ff4b4b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 10px 25px rgba(255, 75, 75, 0.2));
            margin-bottom: 1rem;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Text Stylings */
        .title {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
        }

        .subtitle {
            color: #ff4b4b;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .description {
            color: #cccccc;
            font-size: 1.1rem;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        /* Firebase-Ready Input Group */
        .action-group {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .glass-input {
            padding: 14px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 1rem;
            width: 250px;
            outline: none;
            transition: all 0.3s ease;
        }

        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* Fixed Glassmorphism Button */
        .glass-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 32px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
            background: rgba(255, 75, 75, 0.2); /* Tinted with primary color */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 75, 75, 0.4);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .glass-btn:hover {
            background: rgba(255, 75, 75, 0.4);
            transform: translateY(-3px);
            box-shadow: 0 10px 40px 0 rgba(255, 75, 75, 0.2);
            border: 1px solid rgba(255, 75, 75, 0.8);
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .wrapper { padding: 2rem 1.5rem; }
            .title { font-size: 2rem; }
            .subtitle { font-size: 1.2rem; }
            .description { font-size: 1rem; padding: 0 1rem; }
            .action-group { flex-direction: column; width: 100%; }
            .glass-input { width: 100%; max-width: 300px; }
            .glass-btn { width: 100%; max-width: 300px; }
        }
    </style>
</head>

<body>
    <div class="bg-image"></div>

    <div class="wrapper">
        <header class="navbar">
            <div class="logo">
                <img src="./android-chrome-192x192.png" alt="BS1" width="35" height="35" onerror="this.style.display='none'">
                <span class="logo-text">Baroda Shop1</span>
            </div>

            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="about-us.html">About Us</a>
            </nav>

            <a href="dashboard.html" class="menu-icon" aria-label="Dashboard">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="15" y2="18"></line>
                </svg>
            </a>
        </header>

        <main class="content">
            <h1 class="glitch-text">404</h1>
            <h2 class="title">Oops!</h2>
            <h3 class="subtitle">Under Construction</h3>
            <p class="description">
                Our engineering team is deploying a massive update.<br> 
                This module will be online shortly. Thank you for your patience.
            </p>
            
            <form class="action-group" onsubmit="event.preventDefault(); /* Insert your Firebase script here */">
                <input type="email" class="glass-input" placeholder="Enter email for updates..." required>
                <button type="submit" class="glass-btn">
                    Notify Me
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </main>
    </div>
</body>

</html>
