<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page under construction | Sarker & Friends | BCSDevloper team</title>
    <link rel="icon" type="image/png" href="logo/favicon.ico">
    <!-- Using Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            /* Changed from 100% to 100vh */
            width: 100vw;
            overflow: hidden;
            position: relative;
            background-color: #000;
        }

        /* Background Setup */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* High-res mountain landscape */
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
            z-index: 1;
            /* Optional: Slight dark overlay for better text readability */
            box-shadow: inset 0 0 0 2000px rgba(0, 0, 0, 0.1);
        }

        /* Wrapper to sit above the background */
        .wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 2rem 4rem;
        }

        /* Header & Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color:#ccc
        }

        .logo-text {
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.2;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            font-size: 1rem;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 0.7;
        }

        .menu-icon {
            cursor: pointer;
        }

        /* Main Content Alignment */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-top: -5vh;
            /* Slight adjustment to match the visual center */
        }

        /* Massive 404 Text */
        .glitch-text {
            font-size: 25vw;
            /* Scales with screen width */
            font-weight: 500;
            line-height: 1;
            letter-spacing: -0.05em;

            /* Creating the metallic/translucent effect */
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.548) 0%, rgba(83, 83, 83, 0.459) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 10px 20px rgba(0, 0, 0, 0.3));
            margin-bottom: -1rem;
        }

        /* Text Stylings */
        .title {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: #e0e0e0;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .description {
            color: #ccc;
            font-size: 1rem;
            max-width: 400px;
            line-height: 1.5;
            margin-bottom: 2.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        /* Glassmorphism Button */
        .glass-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 32px;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;

            /* Glass Effect */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);

            transition: all 0.3s ease;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.3);
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                /* Hide nav on mobile */
            }

            .wrapper {
                padding: 2rem;
            }

            .glitch-text {
                font-size: 35vw;
            }

            .title {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <!-- Background Image Overlay -->
    <div class="bg-image"></div>

    <div class="wrapper">
        <!-- Navigation Header -->
        <header class="navbar">
            <div class="logo">
                <img src = "logo/android-chrome-192x192.png" alt="Sarker & Friends Logo" width="35" height="35">
                <span class="logo-text">Baroda Shop1 1</span>
            </div>

            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="about-us.html">About Us</a>
            </nav>

            <a href="dashboard.html" class="menu-icon" style="color: white; text-decoration: none;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="15" y2="18"></line>
                </svg>
            </a>
        </header>

        <!-- Main 404 Content -->
        <main class="content">
            <h1 class="glitch-text">404</h1>
            <h2 class="title">Oops!</h2>
            <h3 class="subtitle">This page under Construction</h3>
            <p class="description">Our team is under work to build up this page  . <br> This may take 1 - 2 week to complet . <br> Please be paitend . </p>

            <a href="index.html" class="glass-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Dashboard
            </a>
        </main>
    </div>
</body>

</html>
