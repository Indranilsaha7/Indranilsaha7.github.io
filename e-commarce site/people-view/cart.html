<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="logo/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Baroda Shop1</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Component Styles -->
    <link rel="stylesheet" href="style/topbar/topbar.css">
    <link rel="stylesheet" href="style/footer/footer.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex-grow: 1;
            padding: 6rem 2rem 2rem 2rem; /* padding top for topbar */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .cart-wrapper {
            width: 100%;
            max-width: 1000px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            min-height: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Cart Item Styling */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .cart-item:last-child { border-bottom: none; }
        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            background: #1e293b;
        }
        .item-details { flex-grow: 1; }
        .item-title { font-weight: 600; font-size: 1.1rem; margin: 0 0 0.3rem 0; color: #f8fafc; }
        .item-price { color: #94a3b8; margin: 0; font-weight: 500; font-size: 0.95rem; }
        
        .qty-controls {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(15, 23, 42, 0.6);
            padding: 0.3rem 0.5rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: fit-content;
            margin-top: 0.5rem;
        }
        .qty-btn {
            background: transparent;
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            font-size: 1.1rem;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .qty-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        
        .item-total {
            font-weight: 600;
            font-size: 1.1rem;
            color: #c084fc;
            width: 90px;
            text-align: right;
        }
        .remove-btn {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: none;
            cursor: pointer;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .remove-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: scale(1.05);
        }
        
        .cart-summary {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1rem;
        }
        .cart-total-text {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f8fafc;
        }
        .cart-total-amount {
            color: #c084fc;
            margin-left: 1rem;
        }
        .checkout-btn {
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -10px rgba(16, 185, 129, 0.5);
        }
        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px rgba(16, 185, 129, 0.6);
        }
        
        /* Enhanced Mobile Theme */
        @media (max-width: 768px) {
            main {
                padding: 5.5rem 1rem 2rem 1rem;
            }
            .cart-wrapper {
                padding: 1.5rem;
                border-radius: 20px;
                background: linear-gradient(145deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.95));
            }
            h2 {
                font-size: 1.7rem !important;
                text-align: center;
            }
            .cart-item {
                flex-wrap: wrap;
                background: rgba(255, 255, 255, 0.03);
                padding: 1.2rem;
                border-radius: 16px;
                border: 1px solid rgba(255, 255, 255, 0.05);
                position: relative;
                gap: 1rem;
                margin-bottom: 1rem;
            }
            .cart-item:last-child {
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }
            .item-details {
                width: calc(100% - 100px);
            }
            .item-title {
                font-size: 1rem;
                padding-right: 2rem; /* Keep text away from trash icon */
            }
            .remove-btn {
                position: absolute;
                top: 1.2rem;
                right: 1.2rem;
                background: transparent;
                width: 30px;
                height: 30px;
            }
            .qty-controls {
                margin-top: 0.5rem;
            }
            .item-total {
                width: 100%;
                text-align: right;
                font-size: 1.3rem;
                margin-top: 0.5rem;
                padding-top: 1rem;
                border-top: 1px dashed rgba(255, 255, 255, 0.1);
            }
            .cart-summary {
                align-items: stretch;
            }
            .cart-total-text {
                text-align: center;
            }
            .checkout-btn {
                width: 100%;
                padding: 1.2rem;
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <div id="topbar-placeholder"></div>
    <main>
        <div class="cart-wrapper" id="cart-container">
            <h2 style="margin-top: 0; font-size: 2rem; font-weight: 600; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Your Cart</h2>
            
            <div id="cart-items"></div>
            
            <div id="cart-summary" class="cart-summary" style="display: none;">
                <div class="cart-total-text">Total: <span class="cart-total-amount" id="total-amount">$0.00</span></div>
                <button class="checkout-btn" onclick="alert('Proceeding to checkout...')">Proceed to Checkout</button>
            </div>

            <p id="empty-msg" style="color: #94a3b8; font-size: 1.1rem; text-align: center; margin-top: 3rem;"><i class="fa-solid fa-cart-shopping"></i> Your cart is currently empty.</p>
        </div>
    </main>
    <div id="footer-placeholder"></div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script/topbar/topbar.js"></script>
    <script src="script/footer/footer.js"></script>
    
    <script>
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('baroda_cart') || '[]');
            const itemsContainer = document.getElementById('cart-items');
            const summary = document.getElementById('cart-summary');
            const emptyMsg = document.getElementById('empty-msg');
            const totalAmount = document.getElementById('total-amount');

            if (cart.length === 0) {
                itemsContainer.innerHTML = '';
                summary.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            }

            emptyMsg.style.display = 'none';
            summary.style.display = 'flex';

            let html = '';
            let total = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                
                html += `
                    <div class="cart-item">
                        <img src="${item.imageUrl}" alt="${item.name}">
                        <div class="item-details">
                            <p class="item-title">${item.name}</p>
                            <p class="item-price">$${item.price.toFixed(2)} each</p>
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="updateQty(${index}, -1)"><i class="fa-solid fa-minus"></i></button>
                                <span style="min-width: 20px; text-align: center; font-weight: 500;">${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQty(${index}, 1)"><i class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>
                        <div class="item-total">$${itemTotal.toFixed(2)}</div>
                        <button class="remove-btn" onclick="removeItem(${index})" title="Remove item"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            });

            itemsContainer.innerHTML = html;
            totalAmount.innerText = '$' + total.toFixed(2);
        }

        // Global functions called by inline HTML onClick events
        window.updateQty = function(index, delta) {
            let cart = JSON.parse(localStorage.getItem('baroda_cart') || '[]');
            if (cart[index]) {
                cart[index].quantity += delta;
                if (cart[index].quantity <= 0) {
                    cart.splice(index, 1);
                }
                localStorage.setItem('baroda_cart', JSON.stringify(cart));
                renderCart();
            }
        };

        window.removeItem = function(index) {
            let cart = JSON.parse(localStorage.getItem('baroda_cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('baroda_cart', JSON.stringify(cart));
            renderCart();
        };

        // Render the cart items as soon as the DOM loads
        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
