<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="logo/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Baroda Shop1</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link to Component Styles (for topbar and footer) -->
    <link rel="stylesheet" href="style/topbar/topbar.css">
    <link rel="stylesheet" href="style/footer/footer.css">
    <link rel="stylesheet" href="style/sidebar-dash/sidebar-das.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex-grow: 1;
            padding: 6rem 2rem 2rem 2rem;
            /* padding top for topbar */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Dashboard Wrapper */
        .dashboard-wrapper {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .dashboard-wrapper {
                grid-template-columns: 1fr;
            }
        }

        /* Content Area */
        .dashboard-content {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            min-height: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .tab-pane {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .info-card {
            background: rgba(15, 23, 42, 0.6);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-card h3 {
            margin-top: 0;
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 500;
        }

        .info-card p {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            overflow-wrap: break-word;
        }

        /* Hide redundant sidebar logout button */
        #logout-btn {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="topbar-placeholder"></div>

    <main>
        <div class="dashboard-wrapper">
            <!-- Sidebar Tab Navigation -->
            <div id="sidebar-placeholder"></div>

            <!-- Tab Contents -->
            <div class="dashboard-content">
                
                <!-- Overview Tab -->
                <div id="tab-overview" class="tab-pane active">
                    <h2 class="section-header">Account Overview</h2>
                    <div id="loading-spinner" style="text-align: center; padding: 2rem;">
                        <i class="fas fa-circle-notch fa-spin fa-3x" style="color: #818cf8;"></i>
                    </div>
                    <div class="user-info" id="user-details" style="display: none;">
                        <div class="info-card">
                            <h3>Full Name</h3>
                            <p id="user-name">Loading...</p>
                        </div>
                        <div class="info-card">
                            <h3>Email Address</h3>
                            <p id="user-email">Loading...</p>
                        </div>
                        <div class="info-card">
                            <h3>Phone</h3>
                            <p id="user-phone">Not provided</p>
                        </div>
                        <div class="info-card">
                            <h3>Role</h3>
                            <p id="user-role">User</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script/topbar/topbar.js"></script>
    <script src="script/footer/footer.js"></script>
    <script src="script/custom-diloague.js"></script>
    <script type="module">
        import { app, auth } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
        import { initSidebar } from "./script/sidebar-das/sidebar-das.js";

        const db = getFirestore(app, "default");

        // Boot up Sidebar Nav
        initSidebar(); 

        // Check authentication state
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // User is signed in, fetch details from Firestore
                try {
                    const userDocRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(userDocRef);

                    document.getElementById('loading-spinner').style.display = 'none';
                    document.getElementById('user-details').style.display = 'grid';

                    document.getElementById('user-email').innerText = user.email;

                    if (docSnap.exists()) {
                        const userData = docSnap.data();
                        document.getElementById('user-name').innerText = userData.fullname || user.displayName || 'Not provided';
                        document.getElementById('user-phone').innerText = userData.phone || 'Not provided';
                        document.getElementById('user-role').innerText = (userData.role || 'User').toUpperCase();
                    } else {
                        // Fallback if no Firestore doc exists
                        document.getElementById('user-name').innerText = user.displayName || 'Not provided';
                    }
                } catch (error) {
                    console.error("Error fetching user data:", error);
                    if (window.showMessage) showMessage("Error loading profile data.", "error");
                }
            } else {
                // User is not signed in, redirect to login
                window.location.href = "login.html";
            }
        });

        // Handle manual Sidebar logout button inside the script
        setTimeout(() => {
            const logoutBtn = document.getElementById('logout-btn');
            if(logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    signOut(auth).then(() => {
                        if (window.showMessage) showMessage("Logged out successfully!", "success");
                        setTimeout(() => {
                            window.location.href = "login.html";
                        }, 1000);
                    }).catch(error => console.error("Logout Error:", error));
                });
            }
        }, 500);
    </script>
</body>

</html>
