<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Shop Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="template/logo/favicon.ico">
    <!-- Component Styles -->
    <link rel="stylesheet" href="template/style/sidebar/sidebar.css">
    <link rel="stylesheet" href="template/style/topbar/topbar.css">
    <link rel="stylesheet" href="template/style/footer/footer.css">
    
    <!-- Pre-load theme to prevent flash of white background on reload -->
    <script>
        const savedTheme = localStorage.getItem('shop-theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    </script>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background-color: var(--bg-color, #f8fafc);
    color: var(--text-color, #1e293b);
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background-color 0.3s ease, color 0.3s ease;
}

.main-content {
    flex-grow: 1;
    margin-left: 260px;
    padding: 30px;
    display: flex;
    flex-direction: column;
}

.page-header {
    margin-bottom: 25px;
}

/* Stats Grid */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    background: var(--topbar-bg, #ffffff);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
    border: 1px solid var(--sidebar-border, transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
}

.stat-info h3 {
    color: var(--icon-color, #64748b);
    font-size: 0.9rem;
    font-weight: 500;
    margin-bottom: 5px;
    transition: color 0.3s ease;
}

.stat-info .value {
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--text-color, #1e293b);
    transition: color 0.3s ease;
}

.stat-icon {
    width: 50px;
    height: 50px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    background: rgba(129, 140, 248, 0.1);
    color: #818cf8;
}

/* Loaders */
#loader-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--bg-color, #f8fafc);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: background-color 0.3s ease;
}

/* Responsive Layout Rules */
@media (max-width: 768px) {
    .main-content {
        margin-left: 0;
        padding: 15px;
    }
}

    </style>
</head>
<body>
    <!-- Loader to hide content while verifying shop authentication status -->
    <div id="loader-overlay">
        <div style="font-size: 2rem; color: #818cf8;"><i class="fas fa-spinner fa-spin"></i></div>
    </div>

    <!-- Sidebar Component -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Topbar Component -->
        <div id="topbar-placeholder"></div>

        <div class="page-header">
            <h2>Dashboard Overview</h2>
        </div>

        <!-- Dashboard Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Total Sales</h3>
                    <div class="value" id="total-sales">0</div>
                </div>
                <div class="stat-icon" style="color: #10b981; background: rgba(16, 185, 129, 0.1);"><i class="fas fa-shopping-cart"></i></div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Total Products</h3>
                    <div class="value" id="total-products">0</div>
                </div>
                <div class="stat-icon" style="color: #3b82f6; background: rgba(59, 130, 246, 0.1);"><i class="fas fa-box-open"></i></div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Collection</h3>
                    <div class="value" id="total-collection">$0.00</div>
                </div>
                <div class="stat-icon" style="color: #8b5cf6; background: rgba(139, 92, 246, 0.1);"><i class="fas fa-money-bill-wave"></i></div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Rating</h3>
                    <div class="value" id="shop-rating">0.0</div>
                </div>
                <div class="stat-icon" style="color: #f59e0b; background: rgba(245, 158, 11, 0.1);"><i class="fas fa-star"></i></div>
            </div>
        </div>

        <!-- Footer Component -->
        <div id="footer-placeholder"></div>
    </main>

    <!-- UI Scripts -->
    <script src="template/script/sidebar/sidebar.js"></script>
    <script src="template/script/topbar/topbar.js"></script>
    <script src="template/script/footer/footer.js"></script>

    <!-- Firebase Integration -->
    <script type="module">
        import { app } from "./firebase-config.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const db = getFirestore(app, "default");
        const loader = document.getElementById('loader-overlay');

        window.addEventListener("load", async () => {
            const isAuthenticated = sessionStorage.getItem('shopAuthenticated');
            const shopId = sessionStorage.getItem('shopId');

            if (isAuthenticated === 'true' && shopId) {
                try {
                    const shopRef = doc(db, 'shops', shopId);
                    const shopSnap = await getDoc(shopRef);

                    if (shopSnap.exists()) {
                        const shopData = shopSnap.data();
                        
                        // Check if the user/shop is blocked, disabled, inactive, or suspended
                        const status = (shopData.status || "").toLowerCase();
                        if (['disabled', 'blocked', 'inactive', 'suspended'].includes(status)) {
                            alert(`Your shop account is currently ${status}. Access is denied. Please contact support.`);
                            sessionStorage.removeItem('shopAuthenticated');
                            sessionStorage.removeItem('shopId');
                            sessionStorage.removeItem('shopName');
                            window.location.replace('login.html');
                            return;
                        }

                        document.getElementById('total-sales').innerText = shopData.totalSell || 0;
                        document.getElementById('total-products').innerText = shopData.totalProduct || 0;
                        document.getElementById('total-collection').innerText = shopData.totalCollection ? `$${shopData.totalCollection}` : "$0.00";
                        document.getElementById('shop-rating').innerText = shopData.rating ? shopData.rating.toFixed(1) : "0.0";
                    }
                    
                    loader.style.display = 'none';
                } catch (error) {
                    console.error("Error fetching shop stats:", error);
                    loader.style.display = 'none';
                }
            } else {
                window.location.replace('login.html');
            }
        });
    </script>
</body>
</html>
