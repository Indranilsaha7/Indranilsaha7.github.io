<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products | Shop Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="template/logo/favicon.ico">
    <!-- Component Styles -->
    <link rel="stylesheet" href="template/style/sidebar/sidebar.css">
    <link rel="stylesheet" href="template/style/topbar/topbar.css">
    <link rel="stylesheet" href="template/style/footer/footer.css">
    <!-- Include Chart.js for rendering graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Include IndexedDB helper library for offline storage -->
    <script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
    <!-- Lottie Animation library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --sidebar-bg: #ffffff;
            --sidebar-border: #e2e8f0;
            --card-bg: #ffffff;
            --input-bg: #f1f5f9;
            --input-border: #cbd5e1;
            --table-border: #e2e8f0;
            --table-hover: #f1f5f9;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --sidebar-bg: #1e293b;
            --sidebar-border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(30, 41, 59, 0.7);
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: rgba(255, 255, 255, 0.1);
            --table-border: rgba(255, 255, 255, 0.1);
            --table-hover: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Sidebar styles are now in sidebar.css and loaded in the <head> */

        .main-content {
            margin-left: 260px; /* Consistent with other pages */
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--sidebar-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5rem;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            margin: 0;
            font-weight: 600;
        }

        /* Button Styles */
        .btn {
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }

        .btn-secondary {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-color);
        }

        .btn-secondary:hover {
            background: var(--table-hover);
        }

        /* Search Bar Setup */
        .search-container {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 800px;
            flex-wrap: wrap;
        }

        .search-container input[type="text"] {
            flex-grow: 1;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-color);
        }

        .search-container input[type="text"]:focus {
            outline: none;
            border-color: #818cf8;
        }

        /* Advanced Search Toggle Section */
        .advanced-search {
            display: none;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--sidebar-border);
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .advanced-search.active {
            display: grid;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.7rem;
            border-radius: 6px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        /* Table Styles */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 1rem;
            border-bottom: 1px solid var(--table-border);
            white-space: nowrap;
        }

        th {
            font-weight: 500;
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody tr:hover {
            background: var(--table-hover);
        }

        /* Action Icons */
        .action-btns {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .btn-info {
            background: #3b82f6;
        }

        .btn-info:hover {
            background: #2563eb;
        }

        .btn-edit {
            background: #f59e0b;
        }

        .btn-edit:hover {
            background: #d97706;
        }

        .btn-delete {
            background: #ef4444;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(129, 140, 248, 0.1);
            color: #818cf8;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0s 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.3s ease;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            width: 95%;
            max-width: 1000px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-color);
        }

        .modal-header {
            border-bottom: 1px solid var(--sidebar-border);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .modal-body-content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .product-header {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            align-items: flex-start;
        }

        .product-image-container {
            flex: 0 0 180px;
        }

        .product-image-preview {
            width: 100%;
            height: 180px;
            object-fit: contain;
            border-radius: 12px;
            background: var(--input-bg);
            border: 1px solid var(--sidebar-border);
            margin-bottom: 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 10px;
            box-sizing: border-box;
        }

        .product-titles h4 {
            margin: 0 0 0.5rem 0;
            color: var(--text-color);
            font-size: 1.6rem;
            font-weight: 600;
        }

        .product-titles .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin: 0 0 1.2rem 0;
        }

        .tags-flex {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tags-flex span {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .tag-stock { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .tag-rating { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .tag-barcode { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }

        .financial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .fin-card {
            background: var(--input-bg);
            padding: 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .fin-card.full-width {
            grid-column: 1 / -1;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        .fin-label {
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .fin-value {
            color: var(--text-color);
            font-size: 1.2rem;
            font-weight: 600;
        }

        .highlight-profit { color: #10b981; }
        .highlight-alert { color: #ef4444; }

        .description-section h4, .search-tags-section h4 {
            margin-top: 0;
            margin-bottom: 0.8rem;
            font-size: 1.2rem;
            color: var(--text-color);
        }

        .desc-box {
            background: var(--input-bg);
            padding: 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--sidebar-border);
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .search-tags-flex {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .search-tag {
            background: rgba(129, 140, 248, 0.1);
            color: #818cf8;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .ai-overview-container {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.05) 0%, rgba(124, 58, 237, 0.05) 100%);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid rgba(129, 140, 248, 0.2);
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
        }

        .ai-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .ai-header h4 {
            margin: 0 0 0.5rem 0;
            color: #c084fc;
            font-size: 1.4rem;
        }

        .ai-header p {
            font-size: 0.9rem;
            color: #94a3b8;
            margin: 0;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            align-items: stretch;
        }

        .chart-card {
            background: var(--card-bg);
            padding: 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--sidebar-border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .chart-card h5 {
            font-size: 0.95rem;
            color: #94a3b8;
            margin: 0 0 1rem 0;
            font-weight: 500;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            height: 200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .canvas-wrapper.doughnut {
            max-width: 220px;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
            }
            .product-header {
                flex-direction: column;
            }
            .product-image-container {
                width: 100%;
                flex: auto;
            }
            .product-image-preview {
                height: 200px;
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Animation Overlay -->
    <div id="animation-overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10001; justify-content: center; align-items: center; flex-direction: column;">
        <div style="background: var(--card-bg); padding: 30px; border-radius: 16px; text-align: center; display: flex; flex-direction: column; align-items: center; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            <div id="lottie-container" style="width: 150px; height: 150px;"></div>
            <h3 id="animation-message" style="margin-top: 20px; color: var(--text-color); font-weight: 500;"></h3>
            <button id="animation-close-btn" class="btn-primary" style="margin-top: 20px; display: none;">Close</button>
        </div>
    </div>

    <div id="sidebar-placeholder"></div>
    <main class="main-content">
        <div id="topbar-placeholder"></div>

            <h1>All Products</h1>
            <a href="add-product.html" class="btn btn-primary"><i class="fas fa-plus"></i> Add New Product</a>
        </div>

        <!-- Search Area -->
        <div class="card">
            <div class="search-container">
                <input type="text" placeholder="Search by Name, Brand, Category, Barcode, or Tag..." id="global-search">
                <button class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
                <button class="btn btn-secondary" id="toggle-advanced"><i class="fas fa-sliders-h"></i>
                    Advanced</button>
            </div>

            <!-- Advanced Search Fields -->
            <div class="advanced-search" id="advanced-search-panel">
                <div class="form-group">
                    <label>Supplier Selector</label>
                    <select id="adv-supplier">
                        <option value="">All Suppliers</option>
                        <option value="sup1">Global Tech Supplies</option>
                        <option value="sup2">Fashion Hub Wholesale</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category Selector</label>
                    <select id="adv-category">
                        <option value="">All Categories</option>
                        <option value="electronics">Electronics</option>
                        <option value="fashion">Fashion</option>
                        <option value="home">Home & Decor</option>
                        <option value="sports">Sports</option>
                        <option value="beauty">Beauty & Personal Care</option>
                        <option value="toys">Toys & Games</option>
                        <option value="automotive">Automotive</option>
                        <option value="grocery">Grocery & Food</option>
                        <option value="health">Health & Wellness</option>
                        <option value="books">Books & Stationery</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Min Buy Price</label>
                    <input type="number" id="adv-min-buy" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Max Buy Price</label>
                    <input type="number" id="adv-max-buy" placeholder="9999.00">
                </div>
                <div class="form-group">
                    <label>Min Sell Price</label>
                    <input type="number" id="adv-min-sell" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Max Sell Price</label>
                    <input type="number" id="adv-max-sell" placeholder="9999.00">
                </div>
            </div>
        </div>

        <!-- Products Table -->
        <div class="card">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Barcode</th>
                            <th>Product Name</th>
                            <th>Brand</th>
                            <th>Category</th>
                            <th>Buy Price</th>
                            <th>Sell Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Product rows will be dynamically inserted here by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Product Details Modal -->
        <div id="details-modal" class="modal-overlay">
            <div class="modal-content">
                <button class="modal-close">&times;</button>
                <div class="modal-header" id="modal-header" title="Drag to move">
                    <h3 id="modal-product-name">Product Details</h3>
                </div>
                <div class="modal-body">
                </div>
            </div>
        </div>

        <div id="footer-placeholder"></div>
    </main>

    <!-- Load Sidebar Script -->
    <script src="template/script/sidebar/sidebar.js"></script>
    <script src="template/script/topbar/topbar.js"></script>
    <script src="template/script/footer/footer.js"></script>
    <script>
        // Advanced Search Toggle Logic
        document.getElementById('toggle-advanced').addEventListener('click', function () {
            const panel = document.getElementById('advanced-search-panel');
            panel.classList.toggle('active');
        });

    </script>

    <!-- Firebase Integration to load products -->
    <script type="module">
        import { app } from "./firebase-config.js";
        import { getFirestore, collection, getDocs, query, orderBy, doc, deleteDoc, updateDoc, increment, collectionGroup, where, limit } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-functions.js";

        const db = getFirestore(app, "default");
        const functions = getFunctions(app);
        const productsTableBody = document.querySelector("table tbody");
        let currentShopId = null;
        let allProductsData = []; // To store data for client-side search

        // Check authentication on page load
        window.addEventListener("load", async () => {
            const isAuthenticated = sessionStorage.getItem('shopAuthenticated');
            currentShopId = sessionStorage.getItem('shopId');

            if (isAuthenticated === 'true' && currentShopId) {
                // Offline-first approach: Load local data instantly, then sync with network
                await loadProductsFromLocal();
                await fetchAndSyncProducts(currentShopId);
            } else {
                window.location.replace('login.html');
            }
        });

        // --- IndexedDB Setup for Offline Support ---
        const dbName = 'barodashop-db';
        const dbVersion = 1;

        async function openDB() {
            return idb.openDB(dbName, dbVersion, {
                upgrade(db) {
                    if (!db.objectStoreNames.contains('products')) {
                        db.createObjectStore('products', { keyPath: 'id' });
                    }
                },
            });
        }

        function showAnimation(type, message, autoClose = true, redirectUrl = null) {
            const overlay = document.getElementById('animation-overlay');
            const container = document.getElementById('lottie-container');
            const msgElement = document.getElementById('animation-message');
            const closeBtn = document.getElementById('animation-close-btn');
            
            overlay.style.display = 'flex';
            msgElement.innerText = message;
            container.innerHTML = '';
            closeBtn.style.display = autoClose ? 'none' : 'block';

            let animationFile = type === 'success' ? 'template/animation/success.json' 
                              : type === 'error' ? 'template/animation/error.json' 
                              : 'template/animation/alert.json';

            lottie.loadAnimation({
                container: container,
                renderer: 'svg',
                loop: type !== 'success',
                autoplay: true,
                path: animationFile
            });

            const handleClose = () => {
                overlay.style.display = 'none';
                if (redirectUrl) window.location.href = redirectUrl;
            };

            if (autoClose) setTimeout(handleClose, 2500);
            else closeBtn.onclick = handleClose;
        }

        async function loadProductsFromLocal() {
            try {
                const localDb = await openDB();
                const products = await localDb.getAll('products');
                if (products.length > 0) {
                    allProductsData = products;
                    renderProducts(products);
                } else {
                    productsTableBody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 2rem;">Loading products from network...</td></tr>';
                }
            } catch (error) {
                console.error("Error loading products from IndexedDB:", error);
                productsTableBody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 2rem;">Could not load local data. Fetching from network...</td></tr>';
            }
        }

        async function fetchAndSyncProducts(shopId) {
            try {
                const localDb = await openDB();
                const productsRef = collection(db, 'products');
                const q = query(productsRef, where("shopId", "==", shopId));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    productsTableBody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 2rem;">No products found. <a href="add-product.html">Add your first product!</a></td></tr>';
                    return;
                }

                const networkProducts = [];

                for (const doc of querySnapshot.docs) {
                    const product = { id: doc.id, ...doc.data() };
                    networkProducts.push(product);

                    const localProduct = await localDb.get('products', product.id);

                    // If product is new or image is not stored locally, fetch and store it.
                    // A more robust check would use a `lastUpdated` timestamp.
                    if (!localProduct || !localProduct.imageBlob) {
                        if (product.imageUrl) {
                            try {
                                const response = await fetch(product.imageUrl);
                                if (response.ok) {
                                    product.imageBlob = await response.blob();
                                }
                            } catch (imgError) {
                                console.warn(`Failed to fetch and cache image for ${product.name}:`, imgError);
                            }
                        }
                    } else {
                        // If image already exists locally, keep using it.
                        product.imageBlob = localProduct.imageBlob;
                    }
                    await localDb.put('products', product); // Add or update the product in IndexedDB
                }

                // Re-append any pending/local-only products so they don't disappear while syncing
                const allLocalProducts = await localDb.getAll('products');
                const pendingProducts = allLocalProducts.filter(p => p.syncStatus === 'pending' || p.syncStatus === 'failed');
                // Sort products locally by createdAt desc to avoid requiring a composite index in Firestore
                const combinedProducts = [...pendingProducts, ...networkProducts].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                allProductsData = combinedProducts;
                renderProducts(combinedProducts);

            } catch (error) {
                console.error("Error fetching/syncing products from Firestore: ", error);
                productsTableBody.innerHTML = '<tr><td colspan="8" style="text-align:center; color: #ef4444; padding: 2rem;">Failed to load products. Please try again later.</td></tr>';
            }
        }

        function renderProducts(products) {
            productsTableBody.innerHTML = ''; // Clear the table
            if (products.length === 0) {
                productsTableBody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 2rem;">No products match your search.</td></tr>';
                return;
            }

            products.forEach((product) => {
                const isPending = product.syncStatus === 'pending' || product.syncStatus === 'failed';
                const row = document.createElement('tr');
                row.setAttribute('data-product-id', product.id);
                if (isPending) row.style.opacity = '0.7';
                row.innerHTML = `
                    <td><span class="badge">${product.barcode}</span></td>
                    <td>${product.name} ${isPending ? '<span class="badge" style="background:#f59e0b;color:#fff;margin-left:8px;"><i class="fas fa-spinner fa-spin"></i> Syncing</span>' : ''}</td>
                    <td>${product.brand}</td>
                    <td>${product.category}</td>
                    <td>$${product.buyPrice.toFixed(2)}</td>
                    <td>$${product.sellPrice.toFixed(2)}</td>
                    <td>${product.stock}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-icon btn-info" title="Details" data-id="${product.id}"><i class="fas fa-info-circle"></i></button>
                            <button class="btn-icon btn-edit" title="Edit" data-id="${product.id}"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon btn-delete" title="Delete" data-id="${product.id}"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </td>
                `;
                productsTableBody.appendChild(row);
            });
        }

        // Event Delegation for action buttons
        productsTableBody.addEventListener('click', async (e) => {
            const button = e.target.closest('button');
            if (!button) return;

            const productId = button.dataset.id;

            if (button.classList.contains('btn-delete')) {
                if (confirm('Are you sure you want to delete this product? This action cannot be undone.')) {
                    try {
                        const product = allProductsData.find(p => p.id === productId);

                        await deleteDoc(doc(db, 'products', productId));
                        const shopRef = doc(db, 'shops', currentShopId);
                        await updateDoc(shopRef, { totalProduct: increment(-1) });
                        
                        const localDb = await openDB();
                        await localDb.delete('products', productId);
                        
                        button.closest('tr').remove();
                        showAnimation('success', 'Product deleted successfully.', true);

                        // Delete images from GitHub in the background
                        if (product) {
                            const deleteImageFromGithub = httpsCallable(functions, 'deleteImageFromGithub');
                            let urlsToDelete = [];
                            if (product.imageUrls && product.imageUrls.length > 0) {
                                urlsToDelete = product.imageUrls;
                            } else if (product.imageUrl) {
                                urlsToDelete = [product.imageUrl];
                            }
                            
                            urlsToDelete.forEach(async (url) => {
                                try {
                                    if (url.includes('github.com') || url.includes('githubusercontent.com')) {
                                        const urlObj = new URL(url);
                                        const filename = urlObj.pathname.split('/').pop();
                                        if (filename) {
                                            // Check if image is used by other products before deleting
                                            let isShared = false;
                                            try {
                                                const q1 = query(collectionGroup(db, 'products'), where('imageUrl', '==', url), limit(2));
                                                const snap1 = await getDocs(q1);
                                                if (snap1.docs.some(d => d.id !== productId)) {
                                                    isShared = true;
                                                }
                                                
                                                if (!isShared) {
                                                    const q2 = query(collectionGroup(db, 'products'), where('imageUrls', 'array-contains', url), limit(2));
                                                    const snap2 = await getDocs(q2);
                                                    if (snap2.docs.some(d => d.id !== productId)) {
                                                        isShared = true;
                                                    }
                                                }
                                            } catch (queryErr) {
                                                console.warn("Could not verify image usage, skipping deletion to be safe.", queryErr);
                                                isShared = true; // Default to safe
                                            }
                                            if (!isShared) {
                                                await deleteImageFromGithub({ filename });
                                            }
                                        }
                                    }
                                } catch (e) {
                                    console.warn("Failed to delete image from GitHub:", e);
                                }
                            });
                        }
                    } catch (error) {
                        console.error("Error deleting product:", error);
                        showAnimation('error', 'Failed to delete product. Please try again.', false);
                    }
                }
            }

            if (button.classList.contains('btn-edit')) {
                window.location.href = `add-product.html?edit=${productId}`;
            }

            if (button.classList.contains('btn-info')) {
                const product = allProductsData.find(p => p.id === productId);
                if (product) {
                    const modal = document.getElementById('details-modal');
                    document.getElementById('modal-product-name').innerText = product.name;

                    let imgHtml;
                    if (product.imageBlob) {
                        // If a local blob exists, create a temporary URL for it
                        const localImageUrl = URL.createObjectURL(product.imageBlob);
                        imgHtml = `<img src="${localImageUrl}" alt="${product.name}" class="product-image-preview">`;
                    } else if (product.imageUrl) {
                        imgHtml = `<img src="${product.imageUrl}" alt="${product.name}" class="product-image-preview">`;
                    } else {
                        imgHtml = `<div class="product-image-preview" style="display:flex;align-items:center;justify-content:center;color:#94a3b8;">No Image Available</div>`;
                    }

                    modal.querySelector('.modal-body').innerHTML = `
                        <div class="modal-body-content">
                            <div class="product-info-section">
                                <div class="product-header">
                                    <div class="product-image-container">
                                        ${imgHtml}
                                    </div>
                                    <div class="product-titles">
                                        <h4>${product.name}</h4>
                                        <p class="subtitle">${product.brand} | ${product.category}</p>
                                        <div class="tags-flex">
                                            <span class="tag-stock"><i class="fas fa-box"></i> Stock: ${product.stock}</span>
                                            <span class="tag-rating"><i class="fas fa-star"></i> ${product.rating || 0} / 5</span>
                                            <span class="tag-barcode"><i class="fas fa-barcode"></i> ${product.barcode}</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="financial-grid">
                                    <div class="fin-card">
                                        <span class="fin-label">Buy Price</span>
                                        <span class="fin-value">$${product.buyPrice.toFixed(2)}</span>
                                    </div>
                                    <div class="fin-card">
                                        <span class="fin-label">Sell Price</span>
                                        <span class="fin-value">$${product.sellPrice.toFixed(2)}</span>
                                    </div>
                                    <div class="fin-card">
                                        <span class="fin-label">Profit Margin</span>
                                        <span class="fin-value highlight-profit">$${(product.sellPrice - product.buyPrice).toFixed(2)}</span>
                                    </div>
                                    <div class="fin-card">
                                        <span class="fin-label">Alert Stock</span>
                                        <span class="fin-value highlight-alert">${product.alertStock || 0}</span>
                                    </div>
                                    <div class="fin-card full-width">
                                        <span class="fin-label">Added On</span>
                                        <span class="fin-value">${product.createdAt ? new Date(product.createdAt).toLocaleString() : 'N/A'}</span>
                                    </div>
                                </div>

                                <div class="description-section">
                                    <h4>Description</h4>
                                    <div class="desc-box">
                                        ${product.description.replace(/\n/g, '<br>')}
                                    </div>
                                </div>

                                ${product.searchTags && product.searchTags.length > 0 ? `
                                <div class="search-tags-section">
                                    <h4>Search Tags</h4>
                                    <div class="search-tags-flex">
                                        ${product.searchTags.map(tag => `<span class="search-tag">#${tag}</span>`).join('')}
                                    </div>
                                </div>` : ''}
                            </div>

                            <div class="ai-overview-container">
                                <div class="ai-header">
                                    <h4><i class="fas fa-robot"></i> AI Overview</h4>
                                    <p>Automated insights based on product history.</p>
                                </div>
                                <div class="charts-grid">
                                    <div class="chart-card">
                                        <h5>Sales vs Purchase</h5>
                                        <div class="canvas-wrapper">
                                            <canvas id="salesPurchaseChart"></canvas>
                                        </div>
                                    </div>
                                    <div class="chart-card">
                                        <h5>Return Rate</h5>
                                        <div class="canvas-wrapper doughnut">
                                            <canvas id="returnsChart"></canvas>
                                        </div>
                                    </div>
                                    <div class="chart-card">
                                        <h5>Customer Rating</h5>
                                        <div class="canvas-wrapper doughnut">
                                            <canvas id="ratingChart"></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    modal.classList.add('active');

                    // Destroy existing charts to avoid overlapping, using distinct variable names to avoid DOM element ID clashes
                    if (window._salesChartInstance) window._salesChartInstance.destroy();
                    if (window._returnsChartInstance) window._returnsChartInstance.destroy();
                    if (window._ratingChartInstance) window._ratingChartInstance.destroy();

                    // --- Chart 1: Sales vs Purchase (Bar) ---
                    const salesCtx = document.getElementById('salesPurchaseChart').getContext('2d');
                    window._salesChartInstance = new Chart(salesCtx, {
                        type: 'bar',
                        data: {
                            labels: ['Purchase', 'Sale'],
                            datasets: [{
                                data: [product.totalPurchase || 0, product.totalSale || 0],
                                backgroundColor: ['rgba(59, 130, 246, 0.6)', 'rgba(16, 185, 129, 0.6)'],
                                borderColor: ['rgb(59, 130, 246)', 'rgb(16, 185, 129)'],
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: { y: { beginAtZero: true } },
                            plugins: { legend: { display: false } }
                        }
                    });

                    // --- Chart 2: Return Rate (Doughnut) ---
                    const returnsCtx = document.getElementById('returnsChart').getContext('2d');
                    const successfulSales = (product.totalSale || 0) - (product.totalSellReturn || 0);
                    window._returnsChartInstance = new Chart(returnsCtx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Successful Sales', 'Returns'],
                            datasets: [{
                                data: [successfulSales < 0 ? 0 : successfulSales, product.totalSellReturn || 0],
                                backgroundColor: ['rgba(16, 185, 129, 0.6)', 'rgba(239, 68, 68, 0.6)'],
                                borderColor: ['rgb(16, 185, 129)', 'rgb(239, 68, 68)'],
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'top', labels: { boxWidth: 12 } } }
                        }
                    });

                    // --- Chart 3: Customer Rating (Gauge) ---
                    const ratingCtx = document.getElementById('ratingChart').getContext('2d');
                    const rating = product.rating || 0;
                    window._ratingChartInstance = new Chart(ratingCtx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Rating', ''],
                            datasets: [{
                                data: [rating, 5 - rating],
                                backgroundColor: ['rgba(245, 158, 11, 0.7)', 'rgba(200, 200, 200, 0.2)'],
                                borderColor: ['rgb(245, 158, 11)', 'rgba(200, 200, 200, 0.5)'],
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            circumference: 180,
                            rotation: -90,
                            cutout: '60%'
                        }
                    });
                }
            }
        });

        // Draggable Modal Logic
        const modalContent = document.querySelector('.modal-content');
        const modalHeader = document.getElementById('modal-header');
        
        let isDragging = false;
        let currentX, currentY, initialX, initialY;
        let xOffset = 0, yOffset = 0;

        modalHeader.style.cursor = 'grab';

        modalHeader.addEventListener('mousedown', (e) => {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;

            if (e.target === modalHeader || e.target.parentNode === modalHeader) {
                isDragging = true;
                modalHeader.style.cursor = 'grabbing';
                modalContent.style.transition = 'none'; // Disable transition during drag for smoothness
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            currentX = e.clientX - initialX;
            currentY = e.clientY - initialY;
            xOffset = currentX;
            yOffset = currentY;
            modalContent.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) scale(1)`;
        });

        document.addEventListener('mouseup', () => {
            if (!isDragging) return;
            initialX = currentX;
            initialY = currentY;
            isDragging = false;
            modalHeader.style.cursor = 'grab';
            modalContent.style.transition = 'transform 0.3s ease'; // Re-enable scale transition
        });

        // Modal Close Logic
        const modal = document.getElementById('details-modal');
        modal.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay') || e.target.classList.contains('modal-close')) {
                modal.classList.remove('active');
                setTimeout(() => {
                    // Reset position after modal closes so it opens centered next time
                    xOffset = 0;
                    yOffset = 0;
                    modalContent.style.transform = '';
                }, 300);
            }
        });

        // Search & Filter Logic
        function applyFilters() {
            const searchTerm = document.getElementById('global-search').value.toLowerCase();
            const advSupplier = document.getElementById('adv-supplier').value;
            const advCategory = document.getElementById('adv-category').value;
            const minBuy = parseFloat(document.getElementById('adv-min-buy').value);
            const maxBuy = parseFloat(document.getElementById('adv-max-buy').value);
            const minSell = parseFloat(document.getElementById('adv-min-sell').value);
            const maxSell = parseFloat(document.getElementById('adv-max-sell').value);

            const filteredProducts = allProductsData.filter(product => {
                const tags = product.searchTags ? product.searchTags.join(' ') : '';
                const matchesSearch = (
                    product.name.toLowerCase().includes(searchTerm) ||
                    product.brand.toLowerCase().includes(searchTerm) ||
                    product.category.toLowerCase().includes(searchTerm) ||
                    product.barcode.toLowerCase().includes(searchTerm) ||
                    tags.toLowerCase().includes(searchTerm)
                );

                const matchesSupplier = advSupplier === '' || product.supplierId === advSupplier;
                const matchesCategory = advCategory === '' || product.category === advCategory;
                
                const matchesBuy = (!isNaN(minBuy) ? product.buyPrice >= minBuy : true) && 
                                   (!isNaN(maxBuy) ? product.buyPrice <= maxBuy : true);
                const matchesSell = (!isNaN(minSell) ? product.sellPrice >= minSell : true) && 
                                    (!isNaN(maxSell) ? product.sellPrice <= maxSell : true);

                return matchesSearch && matchesSupplier && matchesCategory && matchesBuy && matchesSell;
            });
            renderProducts(filteredProducts);
        }

        // Attach event listeners to all filter inputs
        document.getElementById('global-search').addEventListener('input', applyFilters);
        document.getElementById('adv-supplier').addEventListener('change', applyFilters);
        document.getElementById('adv-category').addEventListener('change', applyFilters);
        document.getElementById('adv-min-buy').addEventListener('input', applyFilters);
        document.getElementById('adv-max-buy').addEventListener('input', applyFilters);
        document.getElementById('adv-min-sell').addEventListener('input', applyFilters);
        document.getElementById('adv-max-sell').addEventListener('input', applyFilters);
    </script>
</body>

</html>
